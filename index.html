<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#13131F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>🧵 Filament Tracker</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#13131F;color:#F0F0F0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
input,select,textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #3A3A50;background:#2A2A3E;color:#F0F0F0;font-size:14px;outline:none;box-sizing:border-box}
textarea{resize:vertical;min-height:60px}
label.lbl{font-size:12px;color:#AAA;margin-bottom:4px;display:block;font-weight:600}
.container{max-width:700px;margin:0 auto;padding:0 16px 24px}
.sticky-header{position:sticky;top:0;z-index:100;background:#13131F;padding:24px 16px 12px;margin:0 -16px}
.mobile-top{margin:0 -16px;padding:0 16px}
@media(max-width:600px){
.sticky-header{padding:6px 12px 6px}
.toolbar{gap:4px;margin-bottom:6px}
.search-input{padding:7px 10px;font-size:13px}
.btn{padding:6px 8px;font-size:14px}
.btn .btn-text{display:none}
.btn-primary{padding:6px 10px;font-size:12px}
.view-btn{padding:5px 8px}
.view-toggle{padding:2px}
.filter-panel{padding:12px}
.mobile-top .title-block{display:block}
.mobile-top .stats-grid{display:grid}
.card-list .status-col{display:none!important}
.card-list .rating-inline{display:inline-block!important}
.spool-grid{grid-template-columns:repeat(3,1fr);gap:6px}
.card-grid{padding:8px;border-radius:12px}
.card-grid .spool-icon-grid{width:48px;height:48px;border-radius:10px;margin-bottom:4px}
.card-grid .spool-img-grid{width:48px;height:48px;border-radius:10px}
.card-grid .grid-extras{display:none!important}
.card-grid .color-name{font-size:11px}
.card-grid .brand-type{font-size:9px;margin-top:1px}
.card-grid .grid-edit-btn{display:none!important}
}
@media(max-width:380px){
.spool-grid{grid-template-columns:repeat(2,1fr);gap:5px}
.card-grid{padding:6px;border-radius:10px}
.card-grid .spool-icon-grid{width:36px;height:36px;border-radius:8px;margin-bottom:2px}
.card-grid .spool-img-grid{width:36px;height:36px;border-radius:8px}
.card-grid .color-name{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.card-grid .brand-type{font-size:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.card-grid .pastille{width:10px;height:10px}
.card-grid .select-checkbox{width:16px;height:16px;font-size:9px;top:4px;left:4px}
.btn-primary{padding:5px 7px;font-size:11px}
}
h1{font-size:26px;font-weight:800;background:linear-gradient(135deg,#7C4DFF,#00BCD4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.stat-card{border-radius:12px;padding:12px 8px;text-align:center}
.stat-val{font-size:22px;font-weight:800}
.stat-lbl{font-size:11px;color:#888}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.search-input{flex:1;min-width:120px;padding:10px 14px;border-radius:12px;border:1px solid #2A2A3E;background:#1E1E2E;color:#F0F0F0;font-size:14px;outline:none}
.btn{padding:10px 14px;border-radius:12px;border:1px solid #2A2A3E;background:#1E1E2E;color:#AAA;cursor:pointer;font-size:13px;font-weight:600;position:relative}
.btn-primary{padding:10px 18px;border-radius:12px;border:none;background:linear-gradient(135deg,#7C4DFF,#536DFE);color:#fff;font-weight:700;cursor:pointer;font-size:14px}
.btn-save{padding:12px 0;border-radius:12px;border:none;background:linear-gradient(135deg,#7C4DFF,#536DFE);color:#fff;font-weight:700;cursor:pointer;font-size:15px;width:100%}
.btn-delete{padding:12px 18px;border-radius:12px;border:1px solid #F44336;background:transparent;color:#F44336;font-weight:700;cursor:pointer;font-size:14px}
.view-toggle{display:flex;gap:4px;background:#1A1A2E;border-radius:10px;padding:3px}
.view-btn{padding:7px 10px;border-radius:8px;border:none;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center}
.badge{position:absolute;top:-6px;right:-6px;background:#7C4DFF;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:800}
.spool-list{display:flex;flex-direction:column;gap:10px}
.spool-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.card-list{display:flex;gap:14px;background:#1A1A2E;border-radius:16px;padding:14px;transition:all 0.15s;border:1px solid #2A2A3E;align-items:flex-start;position:relative}
.card-list:hover{border-color:#3A3A50}
.card-list.selected{border-color:#7C4DFF;background:#7C4DFF11}
.card-list.out-of-stock{opacity:0.45;filter:grayscale(0.5)}
.card-list.out-of-stock:hover{opacity:0.65}
.card-grid{background:#1A1A2E;border-radius:16px;padding:14px;transition:all 0.15s;border:1px solid #2A2A3E;text-align:center;position:relative}
.card-grid:hover{border-color:#3A3A50}
.card-grid.selected{border-color:#7C4DFF;background:#7C4DFF11}
.card-grid.out-of-stock{opacity:0.45;filter:grayscale(0.5)}
.card-grid.out-of-stock:hover{opacity:0.65}
.spool-icon{width:72px;height:72px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.spool-icon-grid{width:72px;height:72px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 8px}
.spool-img{width:72px;height:72px;border-radius:12px;object-fit:cover}
.spool-img-grid{width:72px;height:72px;border-radius:14px;object-fit:cover}
.color-name{font-weight:700;font-size:15px;color:#F0F0F0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brand-type{font-size:12px;color:#999;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block;cursor:pointer;transition:all 0.15s;user-select:none}
.status-badge:hover{filter:brightness(1.2);transform:scale(1.05)}
.specs{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;font-size:11px;color:#AAA}
.specs-grid{font-size:10px;color:#AAA;margin-top:6px}
.progress-bar{width:100%;height:6px;background:#2A2A3E;border-radius:3px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width 0.3s}
.progress-text{font-size:10px;color:#777;margin-top:4px}
.notes-line{font-size:11px;color:#888;margin-top:4px;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal-content{background:#1E1E2E;border-radius:20px;padding:24px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:#888;font-size:22px;cursor:pointer}
.filter-panel{background:#1A1A2E;border-radius:16px;padding:16px;margin-bottom:16px;border:1px solid #2A2A3E}
.filter-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;white-space:nowrap}
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px}
.sec-title{font-size:13px;font-weight:700;color:#CCC;margin-bottom:8px;margin-top:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:12px}
.img-upload{width:80px;height:80px;border-radius:12px;border:2px dashed #555;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;background:#2A2A3E}
.img-upload img{width:100%;height:100%;object-fit:cover}
.img-placeholder{text-align:center;color:#888;font-size:10px;line-height:1.4}
.range-labels{display:flex;justify-content:space-between;font-size:10px;color:#777}
.range-track{height:4px;background:#2A2A3E;border-radius:2px;position:relative;margin-top:12px}
.range-fill{position:absolute;height:100%;background:#7C4DFF;border-radius:2px}
.hidden-range{position:absolute;width:100%;height:30px;opacity:0;cursor:pointer}
.saved-toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#2E7D32;color:#fff;padding:8px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:2000;box-shadow:0 4px 15px rgba(0,0,0,0.4);animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.brand-dropdown{position:relative}
.brand-list{position:absolute;top:100%;left:0;right:0;max-height:180px;overflow-y:auto;background:#2A2A3E;border:1px solid #3A3A50;border-radius:10px;z-index:10;margin-top:4px}
.brand-item{padding:8px 12px;cursor:pointer;font-size:13px;color:#DDD;border-bottom:1px solid #333}
.brand-item:hover{background:#3A3A50}
.color-row{display:flex;gap:8px;align-items:flex-end}
.hex-picker{width:44px;height:42px;border:none;border-radius:8px;cursor:pointer;background:none;padding:0}
.pastille{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;border:2px solid #1A1A2E;z-index:5}
.select-checkbox{position:absolute;top:8px;left:8px;width:22px;height:22px;border-radius:6px;border:2px solid #555;background:#2A2A3E;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;font-size:13px;transition:all 0.15s}
.select-checkbox.checked{background:#7C4DFF;border-color:#7C4DFF;color:#fff}
.select-bar{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#7C4DFF22,#536DFE22);border:1px solid #7C4DFF44;border-radius:14px;padding:10px 16px;margin-bottom:12px;flex-wrap:wrap}
.select-bar-btn{padding:8px 14px;border-radius:10px;border:none;font-weight:700;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px}
.import-zone{border:2px dashed #7C4DFF55;border-radius:14px;padding:30px;text-align:center;cursor:pointer;transition:all 0.2s;background:#7C4DFF08}
.import-zone:hover{border-color:#7C4DFF;background:#7C4DFF15}
.import-zone.dragover{border-color:#7C4DFF;background:#7C4DFF22}
.import-preview{max-height:300px;overflow-y:auto;margin-top:16px}
.import-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#2A2A3E;border-radius:10px;margin-bottom:6px;cursor:pointer}
.import-item .color-dot{width:24px;height:24px;border-radius:6px;flex-shrink:0}
.edit-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;transition:all 0.15s;color:#777;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.edit-btn:hover{background:#7C4DFF22;color:#B39DDB}
.popup-menu{position:absolute;z-index:20;background:#2A2A3E;border:1px solid #3A3A50;border-radius:12px;padding:6px;box-shadow:0 8px 24px rgba(0,0,0,0.5);display:flex;flex-direction:column;gap:4px;min-width:120px}
.popup-item{padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.1s}
.popup-item:hover{filter:brightness(1.1)}
.popup-item .dot{width:8px;height:8px;border-radius:50%}
.dup-btn-on{flex:1;padding:12px 0;border-radius:12px;border:none;font-weight:700;font-size:14px;background:linear-gradient(135deg,#00897B,#26A69A);color:#fff;cursor:pointer}
.dup-btn-off{flex:1;padding:12px 0;border-radius:12px;border:none;font-weight:700;font-size:14px;background:#333;color:#666;cursor:default;opacity:0.4}
.dup-warning{background:#FF980022;border:1px solid #FF980066;border-radius:10px;padding:10px 14px;margin-top:12px;font-size:12px;color:#FFB74D;display:flex;align-items:center;gap:8px}
.qty-ctrl{display:flex;align-items:center;gap:0;background:#2A2A3E;border-radius:8px;border:1px solid #3A3A50;overflow:hidden;flex-shrink:0}
.qty-btn{width:26px;height:26px;border:none;background:transparent;color:#AAA;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s}
.qty-btn:hover{background:#7C4DFF33;color:#fff}
.qty-val{min-width:22px;text-align:center;font-size:12px;font-weight:700;color:#F0F0F0;padding:0 2px}
.qty-zero{color:#F44336}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1100;padding:16px}
.confirm-box{background:#1E1E2E;border-radius:20px;padding:28px;width:100%;max-width:360px;text-align:center}
.confirm-title{font-size:18px;font-weight:700;margin-bottom:8px}
.confirm-msg{font-size:13px;color:#AAA;margin-bottom:20px}
.confirm-actions{display:flex;gap:10px}
.confirm-cancel{flex:1;padding:12px;border-radius:12px;border:1px solid #3A3A50;background:#2A2A3E;color:#AAA;font-weight:700;cursor:pointer;font-size:14px}
.confirm-delete{flex:1;padding:12px;border-radius:12px;border:none;background:#F44336;color:#fff;font-weight:700;cursor:pointer;font-size:14px}
.install-banner{position:fixed;bottom:0;left:0;right:0;background:#1E1E2E;border-top:1px solid #3A3A50;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;z-index:900;gap:12px}
.install-banner-btn{padding:10px 20px;border-radius:12px;border:none;background:linear-gradient(135deg,#7C4DFF,#536DFE);color:#fff;font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap}
.install-banner-close{background:none;border:none;color:#777;font-size:20px;cursor:pointer;padding:4px}
.sync-indicator{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;white-space:nowrap}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-config{background:#1A1A2E;border-radius:16px;padding:16px;margin-bottom:16px;border:1px solid #2A2A3E;max-height:60vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sync-config input{margin-bottom:8px}
.sync-config-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
@media(max-width:600px){
.sync-config{max-height:50vh;padding:14px}
.sync-config-actions .btn,.sync-config-actions .btn-primary{padding:10px 8px;font-size:12px}
}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.sync-spinning{animation:spin 1s linear infinite;display:inline-block}
.lang-toggle{display:inline-flex;background:#1A1A2E;border-radius:8px;padding:2px;gap:2px;font-size:12px;font-weight:700}
.lang-btn{padding:4px 8px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:700;transition:all 0.15s}
</style>
</head>

function uploadToImgBB(base64data){
  if(!syncCfg.imgbbKey)return Promise.resolve(base64data);
  var raw=base64data;if(raw.indexOf(",")!==-1)raw=raw.split(",")[1];
  var form=new FormData();form.append("key",syncCfg.imgbbKey);form.append("image",raw);
  return fetch("https://api.imgbb.com/1/upload",{method:"POST",body:form})
    .then(function(r){if(!r.ok)throw new Error("ImgBB HTTP "+r.status);return r.json()})
    .then(function(data){if(data.success&&data.data&&data.data.url)return data.data.url;throw new Error("ImgBB upload failed")})
    .catch(function(e){console.error("ImgBB error:",e);return base64data});
}
function ensureImagesUploaded(){
  if(!syncCfg.imgbbKey)return Promise.resolve();
  var promises=[];
  spools.forEach(function(s){if(s.img&&s.img.indexOf("data:")===0){promises.push(uploadToImgBB(s.img).then(function(url){s.img=url;try{localStorage.setItem("fi-img-"+s.id,url)}catch(e){}}))}});
  return Promise.all(promises);
}
function uploadAllImages(){
  if(!syncCfg.imgbbKey){toast("❌ "+t("syncConfigImgbb"),2500);return}

  if(!toUpload.length){toast(t("syncAllSynced"),2500);return}
  syncStatus="syncing";syncMsg=t("syncUploadProgress").replace("%d",0).replace("%d",toUpload.length);renderSyncUI();
  var done=0,chain=Promise.resolve();
  toUpload.forEach(function(s){chain=chain.then(function(){return uploadToImgBB(s.img).then(function(url){s.img=url;try{localStorage.setItem("fi-img-"+s.id,url)}catch(e){}done++;syncMsg=t("syncUploadProgress").replace("%d",done).replace("%d",toUpload.length);renderSyncUI()})})});
  chain.then(function(){renderMain();return cloudPush()}).then(function(){toast(t("syncImagesUploaded").replace("%d",toUpload.length),3000)}).catch(function(e){syncStatus="error";syncMsg=e.message;renderSyncUI()});
}
function cloudPush(silent){
  if(!syncCfg.enabled)return Promise.resolve();
  syncStatus="syncing";syncMsg="";if(!silent)renderSyncUI();
  return ensureImagesUploaded().then(function(){
    var payload=spools.map(function(s){return Object.assign({},s)});
    return fetch("https://api.jsonbin.io/v3/b/"+syncCfg.binId,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":syncCfg.apiKey},body:JSON.stringify({spools:payload,brands:BRANDS,updated:Date.now()})});
  }).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}).then(function(){
    syncStatus="success";syncMsg=t("syncSynced");lastSyncTime=Date.now();renderSyncUI();

  }).catch(function(e){syncStatus="error";syncMsg=e.message||"Error";renderSyncUI()});
}
function cloudPull(){
  if(!syncCfg.enabled)return Promise.resolve();
  syncStatus="syncing";syncMsg="...";renderSyncUI();
  return fetch("https://api.jsonbin.io/v3/b/"+syncCfg.binId+"/latest",{headers:{"X-Master-Key":syncCfg.apiKey}})
  .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}).then(function(data){
    var rec=data.record||data;
    if(rec.spools&&Array.isArray(rec.spools)){
      spools=rec.spools.map(function(s){var c=sanitize(s);if(s.img)c.img=s.img;return c});
      if(rec.brands&&Array.isArray(rec.brands))BRANDS=rec.brands;
      try{localStorage.setItem(SK,JSON.stringify(spools.map(function(s){var c=Object.assign({},s);delete c.img;return c})));localStorage.setItem(BK,JSON.stringify(BRANDS));spools.forEach(function(s){if(s.img)try{localStorage.setItem("fi-img-"+s.id,s.img)}catch(e){}})}catch(e){}
      syncStatus="success";syncMsg=t("syncRetrieved");lastSyncTime=Date.now();renderMain();
      setTimeout(function(){if(syncStatus==="success"){syncStatus="idle";renderSyncUI()}},3000);
    }else throw new Error("Invalid format");
  }).catch(function(e){syncStatus="error";syncMsg=e.message;renderSyncUI()});
}
function cloudCreateBin(){
  if(!syncCfg.apiKey)return;
  syncStatus="syncing";syncMsg="...";renderSyncUI();
  var payload=spools.map(function(s){var c=Object.assign({},s);delete c.img;return c});
  fetch("https://api.jsonbin.io/v3/b",{method:"POST",headers:{"Content-Type":"application/json","X-Master-Key":syncCfg.apiKey,"X-Bin-Name":"filament-tracker","X-Bin-Private":"true"},body:JSON.stringify({spools:payload,brands:BRANDS,updated:Date.now()})})

function hexToHSL(hex){try{var r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;var mx=Math.max(r,g,b),mn=Math.min(r,g,b),l=(mx+mn)/2,h=0,s=0;if(mx!==mn){var d=mx-mn;s=l>0.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h=((g-b)/d+(g<b?6:0))*60;break;case g:h=((b-r)/d+2)*60;break;case b:h=((r-g)/d+4)*60;break}}return{h:Math.round(h),s:Math.round(s*100),l:Math.round(l*100)}}catch(e){return{h:0,s:0,l:50}}}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function showConfirm(title,msg,onOk){confirmAction={title:title,msg:msg,fn:onOk};rdrConfirm()}
function closeConfirm(){confirmAction=null;rdrConfirm()}
function execConfirm(){if(confirmAction&&confirmAction.fn)confirmAction.fn();confirmAction=null;rdrConfirm()}
function rdrConfirm(){var el=document.getElementById('confirm-root');if(!confirmAction){el.innerHTML="";return}el.innerHTML='<div class="confirm-overlay" onclick="closeConfirm()"><div class="confirm-box" onclick="event.stopPropagation()"><div class="confirm-title">'+confirmAction.title+'</div><div class="confirm-msg">'+confirmAction.msg+'</div><div class="confirm-actions"><button class="confirm-cancel" onclick="closeConfirm()">'+t("cancel")+'</button><button class="confirm-delete" onclick="execConfirm()">'+t("confirm")+'</button></div></div></div>'}
function toast(msg,ms){document.getElementById('toast-root').innerHTML='<div class="saved-toast">'+msg+'</div>';setTimeout(function(){document.getElementById('toast-root').innerHTML=""},ms||2000)}
function checkDuplicate(sp,excludeId){if(!sp.color||!sp.brand||!sp.type)return null;var c=sp.color.trim().toLowerCase(),b=sp.brand.trim().toLowerCase(),tp=sp.type.trim().toLowerCase();return spools.find(function(s){if(excludeId&&s.id===excludeId)return false;return s.color.trim().toLowerCase()===c&&s.brand.trim().toLowerCase()===b&&s.type.trim().toLowerCase()===tp})||null}
function ensureBrand(b){if(!b)return;b=b.trim();if(!b)return;if(!BRANDS.some(function(x){return x.toLowerCase()===b.toLowerCase()})){BRANDS.push(b);BRANDS.sort(function(a,bb){return a.toLowerCase().localeCompare(bb.toLowerCase())});try{localStorage.setItem(BK,JSON.stringify(BRANDS))}catch(e){}}}

// ── Persistence ──
function loadData(){try{var sb=localStorage.getItem(BK);if(sb)BRANDS=JSON.parse(sb)}catch(e){}try{var st=localStorage.getItem(SK);if(st){var p=JSON.parse(st);if(Array.isArray(p)&&p.length>0)spools=p.map(sanitize)}}catch(e){}renderMain()}
function saveData(){try{var toSave=spools.map(function(s){var c=Object.assign({},s);delete c.img;return c});localStorage.setItem(SK,JSON.stringify(toSave));spools.forEach(function(s){if(s.img)try{localStorage.setItem("fi-img-"+s.id,s.img)}catch(e){}})}catch(e){}toast(t("saved"));cloudPush(true)}
function loadImages(){spools.forEach(function(s){if(!s.img)try{var img=localStorage.getItem("fi-img-"+s.id);if(img)s.img=img}catch(e){}})}

function toggleFilterB(val){var i=fB.indexOf(val);if(i===-1)fB.push(val);else fB.splice(i,1);refreshFilter();renderList()}
function toggleFilterT(val){var i=fT.indexOf(val);if(i===-1)fT.push(val);else fT.splice(i,1);refreshFilter();renderList()}
function toggleFilterS(val){var i=fS.indexOf(val);if(i===-1)fS.push(val);else fS.splice(i,1);refreshFilter();renderList()}

function getFiltered(){
  var r=spools.filter(function(s){if(fB.length&&fB.indexOf(s.brand)===-1)return false;if(fT.length&&fT.indexOf(s.type)===-1)return false;if(fS.length&&fS.indexOf(s.status)===-1)return false;if(s.pct<pMin||s.pct>pMax)return false;if(search&&(s.color+" "+s.brand+" "+s.type+" "+s.code).toLowerCase().indexOf(search.toLowerCase())===-1)return false;return true});
  if(sortVal){var opts=getSortOptions();var so=opts.find(function(o){return o.v===sortVal});if(so)r=r.slice().sort(so.fn)}return r;
}
function getAFC(){return[fB.length>0,fT.length>0,fS.length>0,pMin>0,pMax<100,sortVal!==""].filter(Boolean).length}
function getAllBrands(){return Array.from(new Set(spools.map(function(s){return s.brand}).filter(Boolean))).sort()}
function getAllTypes(){return Array.from(new Set(spools.map(function(s){return s.type}).filter(Boolean))).sort()}
function getStats(){return{total:spools.length,new_:spools.filter(function(s){return s.status==="new"}).length,inuse:spools.filter(function(s){return s.status==="inuse"}).length,empty:spools.filter(function(s){return s.status==="empty"}).length}}

// ── Actions ──
function resetFilters(){fB=[];fT=[];fS=[];pMin=0;pMax=100;sortVal="";renderMain()}
function resetData(){showConfirm(t("resetTitle"),t("resetMsg"),function(){spools=DEFAULT_SPOOLS.map(sanitize);saveData();renderMain()})}
function deleteSpool(id){var s=spools.find(function(x){return x.id===id});showConfirm(t("deleteTitle"),t("deleteMsg").replace("%s",esc(s?s.color:"")).replace("%s",esc(s?s.brand:"")),function(){spools=spools.filter(function(x){return x.id!==id});try{localStorage.removeItem("fi-img-"+id)}catch(e){}editModal=null;saveData();renderMain();renderModals()})}
function addSpoolAction(){if(!canSubmitNew())return;var dup=checkDuplicate(newSpool);if(dup){spools=spools.map(function(s){return s.id===dup.id?Object.assign({},s,{qty:(s.qty||0)+(newSpool.qty||1)}):s});lastAddedSpool=Object.assign({},newSpool);newSpool=freshSpool();addModal=false;dupWarning="";saveData();renderMain();renderModals();toast(t("rollsAdded")+" "+esc(dup.color),2500);return}ensureBrand(newSpool.brand);var id=Math.max.apply(null,[0].concat(spools.map(function(s){return s.id})))+1;spools.push(sanitize(Object.assign({},newSpool,{id:id})));lastAddedSpool=Object.assign({},newSpool);newSpool=freshSpool();addModal=false;dupWarning="";saveData();renderMain();renderModals()}
function addAndDuplicate(){if(!canSubmitNew())return;var dup=checkDuplicate(newSpool);if(dup){spools=spools.map(function(s){return s.id===dup.id?Object.assign({},s,{qty:(s.qty||0)+(newSpool.qty||1)}):s});lastAddedSpool=Object.assign({},newSpool);newSpool=Object.assign({},lastAddedSpool,{color:lastAddedSpool.color+" - copy",img:null});dupWarning="";saveData();renderMain();renderModals();toast(t("rollsAdded")+" "+esc(dup.color),2500);return}ensureBrand(newSpool.brand);var id=Math.max.apply(null,[0].concat(spools.map(function(s){return s.id})))+1;spools.push(sanitize(Object.assign({},newSpool,{id:id})));lastAddedSpool=Object.assign({},newSpool);newSpool=Object.assign({},lastAddedSpool,{color:lastAddedSpool.color+" - copy",img:null});dupWarning="";saveData();renderMain();renderModals()}

function openEdit(id,e){e.stopPropagation();dupWarning="";editModal=Object.assign({},spools.find(function(x){return x.id===id}));renderModals()}
function duplicateFromEdit(){if(!editModal)return;newSpool=Object.assign({},editModal,{color:editModal.color+" - copy",img:null});delete newSpool.id;editModal=null;addModal=true;dupWarning="";renderModals()}

// ── Inline controls ──
function cycleStatus(id,e){e.stopPropagation();ratingPopupId=null;statusPopupId=statusPopupId===id?null:id;renderMain()}
function setStatus(id,st,e){e.stopPropagation();spools=spools.map(function(s){if(s.id===id){var upd={status:st};if(st==="empty"){upd.qty=0;upd.pct=0}else if(st==="new"){if(s.qty===0)upd.qty=1;if(s.pct===0)upd.pct=100}return Object.assign({},s,upd)}return s});statusPopupId=null;saveData();renderMain()}
function toggleRatingPopup(id,e){e.stopPropagation();statusPopupId=null;ratingPopupId=ratingPopupId===id?null:id;renderMain()}
function setRating(id,r,e){e.stopPropagation();spools=spools.map(function(s){return s.id===id?Object.assign({},s,{rating:r}):s});ratingPopupId=null;saveData();renderMain()}
function changeQty(id,d,e){e.stopPropagation();spools=spools.map(function(s){if(s.id===id)return Object.assign({},s,{qty:Math.max(0,(s.qty||0)+d)});return s});saveData();renderMain()}
document.addEventListener('click',function(){if(statusPopupId!==null||ratingPopupId!==null){statusPopupId=null;ratingPopupId=null;renderMain()}});

// ── Selection ──
function toggleSelectMode(){selectMode=!selectMode;selected.clear();renderMain()}
function toggleSelect(id,e){e.stopPropagation();if(selected.has(id))selected.delete(id);else selected.add(id);renderMain()}

function deleteSelected(){if(!selected.size)return;showConfirm(t("deleteTitle"),t("deleteBulkMsg").replace("%d",selected.size).replace("%s",selected.size>1?"s":""),function(){spools=spools.filter(function(s){return!selected.has(s.id)});selected.clear();selectMode=false;saveData();renderMain()})}
function exportSelectedJSON(){var exp=spools.filter(function(s){return selected.has(s.id)}).map(function(s){var c=Object.assign({},s);delete c.id;return c});var blob=new Blob([JSON.stringify(exp,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="filaments_"+exp.length+"_"+new Date().toISOString().slice(0,10)+".json";a.click();selectMode=false;selected.clear();toast(t("exportJSON"));renderMain()}
function exportCSV(){var src=selectMode&&selected.size?spools.filter(function(s){return selected.has(s.id)}):spools;var SC=getStatusCfg(),RC=getRatingCfg();var h="Brand,Type,Color,Code,Hex,Nozzle Temp,Bed Temp,Drying,Speed,Rolls,Status,Rating,% Left,Notes\n";var r=src.map(function(s){return[s.brand,s.type,s.color,s.code,s.hex,s.tempPrint,s.bedTemp||"",s.drying,s.speed||"",s.qty||1,SC[s.status].label,RC[s.rating||"none"].name,s.pct,(s.notes||"").replace(/"/g,'""')].map(function(v){return'"'+v+'"'}).join(",")}).join("\n");var blob=new Blob(["\uFEFF"+h+r],{type:"text/csv;charset=utf-8;"});var a=document.createElement("a");a.download="filaments_"+new Date().toISOString().slice(0,10)+".csv";a.href=URL.createObjectURL(blob);a.click();if(selectMode){selectMode=false;selected.clear()}toast(t("exportCSV"));renderMain()}

// ── Import ──
function openImportModal(){importModal=true;importData=[];importSelected=new Set();importError="";renderModals()}
function closeImportModal(){importModal=false;importData=[];importSelected=new Set();importError="";renderModals()}
function handleImportFile(e){var f;if(e.target&&e.target.files)f=e.target.files[0];else if(e.dataTransfer)f=e.dataTransfer.files[0];if(!f)return;var reader=new FileReader();reader.onload=function(ev){try{var text=ev.target.result,data;if(f.name.endsWith('.json')){data=JSON.parse(text);if(!Array.isArray(data))throw new Error("JSON must be array");data=data.map(sanitize)}else if(f.name.endsWith('.csv')){data=parseCSV(text)}else throw new Error("Unsupported format (.json or .csv)");importData=data;importSelected=new Set(data.map(function(_,i){return i}));importError=""}catch(err){importError="❌ "+err.message;importData=[]}renderModals()};reader.readAsText(f)}
function parseCSV(text){var lines=text.split('\n').map(function(l){return l.trim()}).filter(Boolean);if(lines.length<2)throw new Error("Empty CSV");var headers=lines[0].split(',').map(function(h){return h.replace(/"/g,'').trim().toLowerCase()});var results=[];for(var i=1;i<lines.length;i++){var vals=[],cur="",inQ=false;for(var ci=0;ci<lines[i].length;ci++){var ch=lines[i][ci];if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){vals.push(cur.trim());cur=""}else cur+=ch}vals.push(cur.trim());var row={};headers.forEach(function(h,j){row[h]=vals[j]?vals[j].replace(/^"|"$/g,''):""});var sm={"neuf":"new","en cours":"inuse","terminé":"empty","new":"new","inuse":"inuse","empty":"empty"};results.push(sanitize({brand:row.marque||row.brand||"",type:row.type||"PLA Basic",color:row.couleur||row.color||"Sans nom",code:row.code||"",hex:row.hex||"#888888",tempPrint:row["temp buse"]||row["nozzle temp"]||row.tempprint||"",bedTemp:row["temp lit"]||row["bed temp"]||row.bedtemp||"",drying:row["séchage"]||row.sechage||row.drying||"",speed:row.vitesse||row.speed||"",qty:parseInt(row.rouleaux||row.rolls||row.qty||"1")||1,status:sm[(row.statut||row.status||"new").toLowerCase()]||"new",pct:parseInt(row["% restant"]||row["% left"]||row.pct||"100")||100,img:null,notes:row.notes||"",rating:row.avis||row.rating||"none"}))}return results}
function toggleImportItem(idx){if(importSelected.has(idx))importSelected.delete(idx);else importSelected.add(idx);renderModals()}
function toggleImportAll(){if(importSelected.size===importData.length)importSelected.clear();else importSelected=new Set(importData.map(function(_,i){return i}));renderModals()}
function confirmImport(){var toAdd=importData.filter(function(_,i){return importSelected.has(i)});if(!toAdd.length)return;var maxId=Math.max.apply(null,[0].concat(spools.map(function(s){return s.id})));var added=0,merged=0;toAdd.forEach(function(s){var dup=checkDuplicate(s);if(dup){spools=spools.map(function(x){return x.id===dup.id?Object.assign({},x,{qty:(x.qty||0)+(s.qty||1)}):x});merged++}else{maxId++;ensureBrand(s.brand);spools.push(sanitize(Object.assign({},s,{id:maxId})));added++}});importModal=false;importData=[];importSelected=new Set();importError="";saveData();renderMain();renderModals();var msg=[];if(added)msg.push(added+" added");if(merged)msg.push(merged+" merged");toast("✅ Import: "+msg.join(", "),3000)}

// ── Render helpers ──

function renderCheckbox(id,chk){if(!selectMode)return"";return'<div class="select-checkbox '+(chk?'checked':'')+'" onclick="toggleSelect('+id+',event)">'+(chk?'✓':'')+'</div>'}
function renderSpoolIcon(s,cls){if(showImages&&s.img){return'<div style="position:relative;flex-shrink:0"><img src="'+esc(s.img)+'" class="'+cls+'" onclick="openEdit('+s.id+',event)" style="cursor:pointer" loading="lazy"/><div class="pastille" style="background:'+s.hex+'"></div></div>'}return'<div class="'+cls+'" style="background:'+s.hex+';cursor:pointer" onclick="openEdit('+s.id+',event)"></div>'}

function renderRatingBadge(s,pos){var RC=getRatingCfg();var rt=RC[s.rating||"none"];var popup="";if(ratingPopupId===s.id){popup='<div class="popup-menu" style="'+(pos||'top:100%;right:0;margin-top:4px')+'" onclick="event.stopPropagation()">';RATING_ORDER.forEach(function(k){var c=RC[k];popup+='<div class="popup-item" style="background:'+((s.rating||"none")===k?c.bg:'transparent')+'" onclick="setRating('+s.id+',\''+k+'\',event)"><span>'+c.label+'</span><span style="color:'+c.color+';font-size:11px">'+c.name+'</span></div>'});popup+='</div>';}return'<div style="position:relative;display:inline-block"><span class="status-badge" style="background:'+rt.bg+';color:'+rt.color+';border:1px solid '+rt.color+'44;font-size:12px" onclick="toggleRatingPopup('+s.id+',event)">'+rt.label+' ▾</span>'+popup+'</div>'}

margin-bottom:4px')+'</span></div></div></div>'}

function renderBrandDD(p){var val=p==='add'?newSpool.brand:(editModal?editModal.brand:"");var fl=BRANDS.filter(function(b){return b.toLowerCase().indexOf((val||"").toLowerCase())!==-1});var dd=document.getElementById('brand-dd');if(!dd||!fl.length){if(dd)dd.innerHTML="";return}dd.innerHTML='<div class="brand-list">'+fl.map(function(b){return'<div class="brand-item" onmousedown="event.preventDefault();pickBrand(\''+p+'\',\''+esc(b)+'\')">'+esc(b)+'</div>'}).join("")+'</div>'}
function checkDupLive(p){var data=p==='add'?newSpool:editModal;if(!data)return;var exId=p==='edit'&&editModal?editModal.id:null;var dup=checkDuplicate(data,exId);var el=document.getElementById(p+'-dup-warning');if(dup&&el)el.innerHTML='<div class="dup-warning">'+t("dupWarning")+'</div>';else if(el)el.innerHTML=""}

function updateFieldLive(p,f,v){if(p==='add')newSpool[f]=v;else if(p==='edit'&&editModal)editModal[f]=v;if(f==='status'&&v==='empty'){updateFieldLive(p,'qty',0);updateFieldLive(p,'pct',0);var qEl=document.getElementById(p+'-qty-input');if(qEl)qEl.value='0';var pEl=document.getElementById(p+'-pct-range');if(pEl)pEl.value='0';var lbl=document.getElementById(p+'-pct-label');if(lbl)lbl.textContent=t("pctLabel")+": 0% ("+t("approx")+"0"+t("pctGrams")+")"}if(f==='status'&&v==='new'){var data=p==='add'?newSpool:editModal;if(data&&data.qty===0){updateFieldLive(p,'qty',1);var qEl2=document.getElementById(p+'-qty-input');if(qEl2)qEl2.value='1'}if(data&&data.pct===0){updateFieldLive(p,'pct',100);var pEl2=document.getElementById(p+'-pct-range');if(pEl2)pEl2.value='100';var lbl3=document.getElementById(p+'-pct-label');if(lbl3)lbl3.textContent=t("pctLabel")+": 100% ("+t("approx")+"1000"+t("pctGrams")+")"}}if(f==='pct'){var lbl2=document.getElementById(p+'-pct-label');if(lbl2)lbl2.textContent=t("pctLabel")+": "+v+"% ("+t("approx")+Math.round(v*10)+t("pctGrams")+")"}if(f==='brand'&&brandDropdownOpen===p)renderBrandDD(p);if(p==='add'&&(f==='color'||f==='brand'))refreshAddFooter();if(f==='color'||f==='brand'||f==='type')checkDupLive(p)}
function handleTypeChangeLive(p,tp){updateFieldLive(p,'type',tp);var d=TYPE_DEFAULTS[tp];if(d){updateFieldLive(p,'tempPrint',d.tempPrint);updateFieldLive(p,'bedTemp',d.bedTemp);updateFieldLive(p,'drying',d.drying);var tp2=document.getElementById(p+'-tempPrint');if(tp2)tp2.value=d.tempPrint;var bt=document.getElementById(p+'-bedTemp');if(bt)bt.value=d.bedTemp;var dr=document.getElementById(p+'-drying');if(dr)dr.value=d.drying}}
function handleImgUpload(ev,p){var f=ev.target.files?ev.target.files[0]:null;if(!f)return;var r=new FileReader();r.onload=function(e){updateFieldLive(p,'img',e.target.result);renderModals()};r.readAsDataURL(f)}
function refreshAddFooter(){var el=document.getElementById('add-modal-footer');if(!el)return;var ok=canSubmitNew();el.innerHTML='<button class="btn-save" onclick="addSpoolAction()" style="flex:3;opacity:'+(ok?'1':'0.4')+'"'+(ok?'':' disabled')+'>'+t("addBtn")+'</button><button class="'+(ok?'dup-btn-on':'dup-btn-off')+'" onclick="'+(ok?'addAndDuplicate()':'void(0)')+'"'+(ok?'':' disabled')+'>📋</button>'}

function renderFormFields(data,p){
  var SC=getStatusCfg(),RC=getRatingCfg();
  var stOpts=STATUS_ORDER.map(function(k){return'<option value="'+k+'"'+(data.status===k?' selected':'')+'>'+SC[k].label+'</option>'}).join("");
  var tyOpts=TYPES.map(function(tp){return'<option value="'+tp+'"'+(data.type===tp?' selected':'')+'>'+tp+'</option>'}).join("");
  var raOpts=RATING_ORDER.map(function(k){return'<option value="'+k+'"'+((data.rating||"none")===k?' selected':'')+'>'+RC[k].label+' '+RC[k].name+'</option>'}).join("");
  return'<div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:16px"><div class="img-upload" onclick="document.getElementById(\''+p+'-file\').click()">'+(data.img?'<img src="'+esc(data.img)+'"/>':'<div class="img-placeholder">'+t("photo")+'</div>')+'</div><input type="file" id="'+p+'-file" accept="image/*" style="display:none" onchange="handleImgUpload(event,\''+p+'\')"/><div style="flex:1"><div class="color-row" style="margin-bottom:12px"><div style="flex:1"><label class="lbl">'+t("colorLabel")+'</label><input value="'+esc(data.color)+'" oninput="updateFieldLive(\''+p+'\',\'color\',this.value)" placeholder="Ex: Lilac Purple"/></div><div><label class="lbl">'+t("hexLabel")+'</label><input type="color" value="'+data.hex+'" class="hex-picker" oninput="updateFieldLive(\''+p+'\',\'hex\',this.value)"/></div></div></div></div>'+
  '<div class="form-row"><div class="form-group"><label class="lbl">'+t("brandLabel")+'</label><div class="brand-dropdown"><input id="'+p+'-brand-input" value="'+esc(data.brand)+'" onfocus="showBrandDropdown(\''+p+'\')" oninput="updateFieldLive(\''+p+'\',\'brand\',this.value)" onblur="hideBrandDropdown()" placeholder="'+t("searchOrAdd")+'"/><div id="brand-dd"></div></div></div><div class="form-group"><label class="lbl">'+t("typeLabel")+'</label><select onchange="handleTypeChangeLive(\''+p+'\',this.value)">'+tyOpts+'</select></div></div><div id="'+p+'-dup-warning"></div>'+
  '<div class="form-row"><div class="form-group"><label class="lbl">'+t("statusLabel")+'</label><select onchange="updateFieldLive(\''+p+'\',\'status\',this.value)">'+stOpts+'</select></div><div class="form-group"><label class="lbl">'+t("ratingLabel")+'</label><select onchange="updateFieldLive(\''+p+'\',\'rating\',this.value)">'+raOpts+'</select></div></div>'+
  '<div class="form-row"><div class="form-group"><label class="lbl">'+t("tempNozzle")+'</label><input id="'+p+'-tempPrint" value="'+esc(data.tempPrint)+'" oninput="updateFieldLive(\''+p+'\',\'tempPrint\',this.value)" placeholder="190–230°C"/></div><div class="form-group"><label class="lbl">'+t("tempBed")+'</label><input id="'+p+'-bedTemp" value="'+esc(data.bedTemp)+'" oninput="updateFieldLive(\''+p+'\',\'bedTemp\',this.value)" placeholder="35–45°C"/></div></div>'+
  '<div class="form-row"><div class="form-group"><label class="lbl">'+t("drying")+'</label><input id="'+p+'-drying" value="'+esc(data.drying)+'" oninput="updateFieldLive(\''+p+'\',\'drying\',this.value)" placeholder="55°C, 8H"/></div><div class="form-group"><label class="lbl">'+t("speed")+'</label><input value="'+esc(data.speed||"")+'" oninput="updateFieldLive(\''+p+'\',\'speed\',this.value)" placeholder="50–80 mm/s"/></div></div>'+
  '<div class="form-row"><div class="form-group"><label class="lbl">'+t("codeLabel")+'</label><input value="'+esc(data.code)+'" oninput="updateFieldLive(\''+p+'\',\'code\',this.value)" placeholder="Ex: 11700"/></div><div class="form-group"><label class="lbl">'+t("qtyLabel")+'</label><input type="number" min="0" id="'+p+'-qty-input" value="'+(data.qty!=null?data.qty:1)+'" oninput="updateFieldLive(\''+p+'\',\'qty\',Math.max(0,+this.value||0))" style="text-align:center"/></div></div>'+
  '<div class="form-group"><label class="lbl" id="'+p+'-pct-label">'+t("pctLabel")+': '+data.pct+'% ('+t("approx")+Math.round(data.pct*10)+t("pctGrams")+')</label><input type="range" min="0" max="100" id="'+p+'-pct-range" value="'+data.pct+'" oninput="updateFieldLive(\''+p+'\',\'pct\',+this.value)" style="width:100%;accent-color:#7C4DFF"/></div>'+
  '<div class="form-group"><label class="lbl">'+t("notesLabel")+'</label><textarea oninput="updateFieldLive(\''+p+'\',\'notes\',this.value)" placeholder="'+t("notesPlaceholder")+'">'+esc(data.notes||"")+'</textarea></div>';
}

// ── Filter panel ──
function buildFilterHTML(){
  if(!showFilter)return"";
  var SC=getStatusCfg();_filterBrands=getAllBrands();_filterTypes=getAllTypes();
  var sOpts=getSortOptions().map(function(o){return'<option value="'+o.v+'"'+(sortVal===o.v?' selected':'')+'>'+o.l+'</option>'}).join("");
  var brandChips='<button class="chip" data-filter="brand-all" style="background:'+(fB.length===0?"#7C4DFF22":"#2A2A3E")+';color:'+(fB.length===0?"#7C4DFF":"#888")+';border:'+(fB.length===0?"1px solid #7C4DFF":"1px solid #333")+'">'+t("allBrands")+'</button>';
  for(var bi=0;bi<_filterBrands.length;bi++){var bAct=fB.indexOf(_filterBrands[bi])!==-1;brandChips+='<button class="chip" data-filter="brand" data-val="'+esc(_filterBrands[bi])+'" style="background:'+(bAct?"#7C4DFF22":"#2A2A3E")+';color:'+(bAct?"#7C4DFF":"#888")+';border:'+(bAct?"1px solid #7C4DFF":"1px solid #333")+'">'+esc(_filterBrands[bi])+'</button>'}
  var typeChips='<button class="chip" data-filter="type-all" style="background:'+(fT.length===0?"#7C4DFF22":"#2A2A3E")+';color:'+(fT.length===0?"#7C4DFF":"#888")+';border:'+(fT.length===0?"1px solid #7C4DFF":"1px solid #333")+'">'+t("allTypes")+'</button>';
  for(var ti=0;ti<_filterTypes.length;ti++){var tAct=fT.indexOf(_filterTypes[ti])!==-1;typeChips+='<button class="chip" data-filter="type" data-val="'+esc(_filterTypes[ti])+'" style="background:'+(tAct?"#7C4DFF22":"#2A2A3E")+';color:'+(tAct?"#7C4DFF":"#888")+';border:'+(tAct?"1px solid #7C4DFF":"1px solid #333")+'">'+esc(_filterTypes[ti])+'</button>'}
  var statChips='<button class="chip" data-filter="status-all" style="background:'+(fS.length===0?"#7C4DFF22":"#2A2A3E")+';color:'+(fS.length===0?"#7C4DFF":"#888")+';border:'+(fS.length===0?"1px solid #7C4DFF":"1px solid #333")+'">'+t("allStatuses")+'</button>';
  for(var si=0;si<STATUS_ORDER.length;si++){var sk=STATUS_ORDER[si];var sv=SC[sk];var sAct=fS.indexOf(sk)!==-1;statChips+='<button class="chip" data-filter="status" data-val="'+sk+'" style="background:'+(sAct?sv.border+"22":"#2A2A3E")+';color:'+(sAct?sv.border:"#888")+';border:'+(sAct?"1px solid "+sv.border:"1px solid #333")+'">'+sv.label+'</button>'}
  var summary='';
  if(fB.length||fT.length||fS.length){summary='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:12px;padding-top:10px;border-top:1px solid #2A2A3E">';fB.forEach(function(b){summary+='<span style="background:#7C4DFF33;color:#B39DDB;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px">'+esc(b)+' <span onclick="toggleFilterB(\''+esc(b)+'\')" style="cursor:pointer;opacity:0.7">✕</span></span>'});fT.forEach(function(tp){summary+='<span style="background:#00BCD433;color:#80DEEA;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px">'+esc(tp)+' <span onclick="toggleFilterT(\''+esc(tp)+'\')" style="cursor:pointer;opacity:0.7">✕</span></span>'});fS.forEach(function(k){var sv2=SC[k];summary+='<span style="background:'+sv2.border+'33;color:'+sv2.border+';padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px">'+sv2.label+' <span onclick="toggleFilterS(\''+k+'\')" style="cursor:pointer;opacity:0.7">✕</span></span>'});summary+='</div>'}
  return'<div class="filter-panel" id="filter-panel-inner"><div class="filter-header"><span style="font-weight:700">'+t("filterTitle")+'</span><div><button data-filter="reset" style="background:none;border:none;color:#7C4DFF;cursor:pointer;font-size:12px;margin-right:12px">'+t("reset")+'</button><button data-filter="close" style="background:none;border:none;color:#888;cursor:pointer;font-size:18px">✕</button></div></div>'+
  '<div class="sec-title">'+t("sortBy")+'</div><select data-filter="sort" style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid #3A3A50;background:#2A2A3E;color:#F0F0F0;font-size:14px"><option value="">'+t("sortDefault")+'</option>'+sOpts+'</select>'+
  '<div class="sec-title">'+t("brand")+(fB.length?' <span style="color:#7C4DFF;font-size:11px">('+fB.length+')</span>':'')+'</div><div class="chip-wrap">'+brandChips+'</div>'+
  '<div class="sec-title">'+t("type")+(fT.length?' <span style="color:#7C4DFF;font-size:11px">('+fT.length+')</span>':'')+'</div><div class="chip-wrap">'+typeChips+'</div>'+
  '<div class="sec-title">'+t("status")+(fS.length?' <span style="color:#7C4DFF;font-size:11px">('+fS.length+')</span>':'')+'</div><div class="chip-wrap">'+statChips+'</div>'+
  '<div class="sec-title">'+t("pctRange")+': '+pMin+'% – '+pMax+'%</div><div class="range-labels"><span>0%</span><span>100%</span></div><div style="position:relative;height:30px;margin-top:4px"><input type="range" min="0" max="100" value="'+pMin+'" data-filter="range-min" class="hidden-range" style="z-index:2"/><input type="range" min="0" max="100" value="'+pMax+'" data-filter="range-max" class="hidden-range" style="z-index:3"/><div class="range-track"><div class="range-fill" style="left:'+pMin+'%;width:'+(pMax-pMin)+'%"></div></div></div>'+summary+'</div>';
}

function handleFilterClick(e){var btn=e.target.closest('[data-filter]');if(!btn)return;var f=btn.getAttribute('data-filter');if(f==='brand-all'){fB=[];refreshFilter();renderList()}else if(f==='brand'){var bv=btn.getAttribute('data-val');if(bv!==null){var ix=fB.indexOf(bv);if(ix===-1)fB.push(bv);else fB.splice(ix,1);refreshFilter();renderList()}}else if(f==='type-all'){fT=[];refreshFilter();renderList()}else if(f==='type'){var tv=btn.getAttribute('data-val');if(tv!==null){var ix2=fT.indexOf(tv);if(ix2===-1)fT.push(tv);else fT.splice(ix2,1);refreshFilter();renderList()}}else if(f==='status-all'){fS=[];refreshFilter();renderList()}else if(f==='status'){var sk=btn.getAttribute('data-val');if(sk!==null){var ix3=fS.indexOf(sk);if(ix3===-1)fS.push(sk);else fS.splice(ix3,1);refreshFilter();renderList()}}else if(f==='reset'){fB=[];fT=[];fS=[];pMin=0;pMax=100;sortVal="";refreshFilter();renderList()}else if(f==='close'){showFilter=false;renderMain()}}
function handleFilterSort(e){sortVal=e.target.value;renderList()}
function handleRangeMin(e){if(+e.target.value<=pMax){pMin=+e.target.value;refreshFilter();renderList()}}
function handleRangeMax(e){if(+e.target.value>=pMin){pMax=+e.target.value;refreshFilter();renderList()}}
function bindFilterEvents(){var container=document.getElementById('filter-container');if(!container)return;var clone=container.cloneNode(true);container.parentNode.replaceChild(clone,container);clone.addEventListener('click',handleFilterClick);var sortEl=clone.querySelector('[data-filter="sort"]');if(sortEl)sortEl.addEventListener('change',handleFilterSort);var rMin=clone.querySelector('[data-filter="range-min"]');var rMax=clone.querySelector('[data-filter="range-max"]');if(rMin)rMin.addEventListener('input',handleRangeMin);if(rMax)rMax.addEventListener('input',handleRangeMax)}
function refreshFilter(){var el=document.getElementById('filter-container');if(!el)return;el.innerHTML=buildFilterHTML();bindFilterEvents();var afc=getAFC();var bEl=document.getElementById('filter-badge');if(bEl)bEl.innerHTML=afc?'<span class="badge">'+afc+'</span>':''}

function renderSelectBar(){if(!selectMode)return"";var f=getFiltered(),allS=selected.size===f.length&&f.length>0;return'<div class="select-bar"><button class="select-bar-btn" style="background:#2A2A3E;color:#DDD" onclick="selectAll()">'+(allS?t("deselectAll"):t("selectAll"))+'</button><span style="font-size:13px;color:#B39DDB;font-weight:600">'+selected.size+' '+t("selected")+'</span><div style="flex:1"></div>'+(selected.size?'<button class="select-bar-btn" style="background:#7C4DFF;color:#fff" onclick="exportSelectedJSON()">'+t("exportJSON")+'</button><button class="select-bar-btn" style="background:#00897B;color:#fff" onclick="exportCSV()">'+t("exportCSV")+'</button><button class="select-bar-btn" style="background:#F4433644;color:#F44336" onclick="deleteSelected()">🗑️</button>':'')+'<button class="select-bar-btn" style="background:#333;color:#AAA" onclick="toggleSelectMode()">✕</button></div>'}

function renderList(){var fl=getFiltered(),afc=getAFC(),tQty=spools.reduce(function(a,s){return a+(s.qty||0)},0);var el=document.getElementById('spool-content');if(!el){renderMain();return}el.innerHTML=((afc>0||search)?'<div style="font-size:12px;color:#888;margin-bottom:10px;display:flex;align-items:center;gap:8px"><span>'+fl.length+' '+(fl.length>1?t("resultsPlural"):t("results"))+' '+t("of")+' '+spools.length+'</span>'+(afc>0?'<button onclick="resetFilters()" style="background:none;border:none;color:#7C4DFF;cursor:pointer;font-size:12px;text-decoration:underline">'+t("clear")+'</button>':'')+'</div>':'')+(fl.length===0?'<div style="text-align:center;color:#666;padding:40px">'+t("noResults")+'</div>':'')+(viewMode==="list"?'<div class="spool-list">'+fl.map(renderSpoolList).join("")+'</div>':'<div class="spool-grid">'+fl.map(renderSpoolGrid).join("")+'</div>')+'<div style="text-align:center;margin-top:24px;font-size:12px;color:#555">'+spools.length+' '+t("refs")+' · '+tQty+' '+(tQty>1?t("rollsPlural"):t("rolls"))+' · '+t("approx")+Math.round(spools.reduce(function(a,s){return a+s.pct*10*(s.qty||0)},0))+t("pctGrams")+'</div><div style="text-align:center;margin-top:12px"><button onclick="resetData()" style="background:none;border:none;color:#555;font-size:11px;cursor:pointer;text-decoration:underline">'+t("resetAll")+'</button></div>'}

  }catch(e){console.error("Render error:",e);document.getElementById('app').innerHTML='<div style="padding:40px;text-align:center;color:#F44336">Render error. <button onclick="resetData()" style="color:#7C4DFF;background:none;border:none;cursor:pointer;text-decoration:underline">Reset</button></div>'}
}

// ── Modals ──
function renderModals(){
  var root=document.getElementById('modal-root');var html="";
  if(addModal){var ok=canSubmitNew();
    html+='<div class="modal-overlay" onclick="addModal=false;dupWarning=\'\';renderModals()"><div class="modal-content" onclick="event.stopPropagation()"><button class="modal-close" onclick="addModal=false;dupWarning=\'\';renderModals()">✕</button>'+
      '<h2 style="margin:0 0 18px;font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px">'+t("addTitle")+(lastAddedSpool?'<button onclick="addAndDuplicate()" style="font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid #7C4DFF44;background:#7C4DFF15;color:#B39DDB;cursor:pointer;font-weight:600">'+t("duplicate")+'</button>':'')+'</h2>'+
      renderFormFields(newSpool,'add')+
      '<div id="add-modal-footer" style="display:flex;gap:10px;margin-top:20px"><button class="btn-save" onclick="addSpoolAction()" style="flex:3;opacity:'+(ok?'1':'0.4')+'"'+(ok?'':' disabled')+'>'+t("addBtn")+'</button><button class="'+(ok?'dup-btn-on':'dup-btn-off')+'" onclick="'+(ok?'addAndDuplicate()':'void(0)')+'"'+(ok?'':' disabled')+'>📋</button></div></div></div>';
  }
  if(editModal){
    html+='<div class="modal-overlay" onclick="editModal=null;dupWarning=\'\';renderModals()"><div class="modal-content" onclick="event.stopPropagation()"><button class="modal-close" onclick="editModal=null;dupWarning=\'\';renderModals()">✕</button>'+
      '<h2 style="margin:0 0 18px;font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px">'+t("editTitle")+'<button onclick="duplicateFromEdit()" style="font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid #7C4DFF44;background:#7C4DFF15;color:#B39DDB;cursor:pointer;font-weight:600">'+t("duplicate")+'</button></h2>'+
      renderFormFields(editModal,'edit')+
      '<div style="display:flex;gap:10px;margin-top:20px"><button class="btn-save" style="flex:1" onclick="saveEditAction()">'+t("saveBtn")+'</button><button class="btn-delete" onclick="deleteSpool('+editModal.id+')">🗑️</button></div></div></div>';
  }
  if(importModal){var allS=importSelected.size===importData.length&&importData.length>0;
    html+='<div class="modal-overlay" onclick="closeImportModal()"><div class="modal-content" onclick="event.stopPropagation()" style="max-width:520px"><button class="modal-close" onclick="closeImportModal()">✕</button><h2 style="margin:0 0 6px;font-size:20px;font-weight:700">'+t("importTitle")+'</h2><p style="font-size:12px;color:#888;margin-bottom:16px">'+t("importFormats")+'</p>'+
    '<div class="import-zone" onclick="document.getElementById(\'import-file-input\').click()" ondragover="event.preventDefault();this.classList.add(\'dragover\')" ondragleave="this.classList.remove(\'dragover\')" ondrop="event.preventDefault();this.classList.remove(\'dragover\');handleImportFile(event)"><div style="font-size:36px;margin-bottom:8px">📁</div><div style="font-size:14px;font-weight:600;color:#B39DDB">'+t("importDrop")+'</div></div>'+
    '<input type="file" id="import-file-input" accept=".json,.csv" style="display:none" onchange="handleImportFile(event)"/>'+
    (importError?'<div style="margin-top:12px;padding:10px;background:#F4433622;border-radius:10px;color:#EF5350;font-size:13px">'+importError+'</div>':'')+
    (importData.length?'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;margin-bottom:8px"><span style="font-size:13px;font-weight:700;color:#CCC">'+importData.length+' '+t("importFound")+'</span><button onclick="toggleImportAll()" style="background:none;border:none;color:#7C4DFF;cursor:pointer;font-size:12px;font-weight:600">'+(allS?t("importDeselect"):t("importAll"))+'</button></div><div class="import-preview">'+importData.map(function(s,i){var sel=importSelected.has(i);return'<div class="import-item" onclick="toggleImportItem('+i+')" style="'+(sel?'border:1px solid #7C4DFF44':'border:1px solid transparent')+'"><div class="select-checkbox '+(sel?'checked':'')+'" style="position:static;width:20px;height:20px;font-size:11px">'+(sel?'✓':'')+'</div><div class="color-dot" style="background:'+s.hex+'"></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">'+esc(s.color)+'</div><div style="font-size:11px;color:#888">'+esc(s.brand)+' · '+esc(s.type)+'</div></div><div style="font-size:11px;color:#777">x'+(s.qty||1)+'</div></div>'}).join("")+'</div><button class="btn-save" style="margin-top:16px;opacity:'+(importSelected.size?'1':'0.4')+'" onclick="confirmImport()"'+(importSelected.size?'':' disabled')+'>'+t("importBtn")+' '+importSelected.size+'</button>':'')+
    '</div></div>';
  }
  root.innerHTML=html;
}

// ── Init ──
initLang();
loadSyncCfg();
loadData();
loadImages();
renderMain();
if(syncCfg.enabled){setTimeout(function(){cloudPull()},500)}
</script>
</body>
</html>
