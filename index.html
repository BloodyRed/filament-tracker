@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.sync-spinning{animation:spin 1s linear infinite;display:inline-block}
</style>

  if(!syncCfg.imgbbKey)return Promise.resolve(base64data);
  // Strip data:image/...;base64, prefix
  var raw=base64data;
  if(raw.indexOf(",")!==-1)raw=raw.split(",")[1];
  var form=new FormData();
  form.append("key",syncCfg.imgbbKey);
  form.append("image",raw);
  return fetch("https://api.imgbb.com/1/upload",{method:"POST",body:form})
    .then(function(r){if(!r.ok)throw new Error("ImgBB HTTP "+r.status);return r.json()})
    .then(function(data){
      if(data.success&&data.data&&data.data.url)return data.data.url;
      throw new Error("ImgBB upload failed");
    }).catch(function(e){console.error("ImgBB error:",e);return base64data});
}

function ensureImagesUploaded(){
  // Upload any base64 images to ImgBB, replace with URLs
  if(!syncCfg.imgbbKey)return Promise.resolve();
  var promises=[];
  spools.forEach(function(s){
    if(s.img&&s.img.indexOf("data:")===0){
      var p=uploadToImgBB(s.img).then(function(url){
        s.img=url;
        // Update local storage too
        try{localStorage.setItem("fi-img-"+s.id,url)}catch(e){}
      });
      promises.push(p);
    }
  });
  return Promise.all(promises);
}

function uploadAllImages(){
  if(!syncCfg.imgbbKey){toast("❌ Configure ta clé ImgBB d'abord",2500);return}
  var toUpload=spools.filter(function(s){return s.img&&s.img.indexOf("data:")===0});
  if(!toUpload.length){toast("✅ Toutes les images sont déjà synchronisées",2500);return}
  syncStatus="syncing";syncMsg="Upload 0/"+toUpload.length+" images...";renderSyncUI();
  var done=0;
  var chain=Promise.resolve();
  toUpload.forEach(function(s){
    chain=chain.then(function(){
      return uploadToImgBB(s.img).then(function(url){
        s.img=url;
        try{localStorage.setItem("fi-img-"+s.id,url)}catch(e){}
        done++;
        syncMsg="Upload "+done+"/"+toUpload.length+" images...";renderSyncUI();
      });
    });
  });
  chain.then(function(){
    syncMsg="Images uploadées, sync...";renderSyncUI();
    renderMain();
    return cloudPush();
  }).then(function(){
    toast("☁️ "+toUpload.length+" image"+(toUpload.length>1?"s":"")+" synchronisée"+(toUpload.length>1?"s":"")+" !",3000);
  }).catch(function(e){
    syncStatus="error";syncMsg=e.message||"Erreur upload";renderSyncUI();
  });
}

function cloudPush(silent){
  if(!syncCfg.enabled)return Promise.resolve();
  syncStatus="syncing";syncMsg=syncCfg.imgbbKey?"Upload images...":"";if(!silent)renderSyncUI();
  return ensureImagesUploaded().then(function(){
    syncMsg="Synchronisation...";if(!silent)renderSyncUI();
    var payload=spools.map(function(s){var c=Object.assign({},s);return c});
    return fetch("https://api.jsonbin.io/v3/b/"+syncCfg.binId,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":syncCfg.apiKey},
      body:JSON.stringify({spools:payload,brands:BRANDS,updated:Date.now()})
    });
  }).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}).then(function(){
    syncStatus="success";syncMsg="Synchronisé ✓";lastSyncTime=Date.now();renderSyncUI();
    setTimeout(function(){if(syncStatus==="success"){syncStatus="idle";renderSyncUI()}},3000);
  }).catch(function(e){
    syncStatus="error";syncMsg=e.message||"Erreur";renderSyncUI();
    console.error("Cloud push error:",e);
  });
}

function cloudPull(){
  if(!syncCfg.enabled)return Promise.resolve();
  syncStatus="syncing";syncMsg="Récupération...";renderSyncUI();
  return fetch("https://api.jsonbin.io/v3/b/"+syncCfg.binId+"/latest",{
    headers:{"X-Master-Key":syncCfg.apiKey}
  }).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}).then(function(data){
    var rec=data.record||data;
    if(rec.spools&&Array.isArray(rec.spools)){
      spools=rec.spools.map(function(s){
        var clean=sanitize(s);
        // Keep image URL (could be ImgBB URL or base64)
        if(s.img)clean.img=s.img;
        return clean;
      });
      if(rec.brands&&Array.isArray(rec.brands))BRANDS=rec.brands;
      // Save locally
      try{
        localStorage.setItem(SK,JSON.stringify(spools.map(function(s){var c=Object.assign({},s);delete c.img;return c})));
        localStorage.setItem(BK,JSON.stringify(BRANDS));
        // Cache images locally
        spools.forEach(function(s){if(s.img)try{localStorage.setItem("fi-img-"+s.id,s.img)}catch(e){}});
      }catch(e){}
      syncStatus="success";syncMsg="Données récupérées ✓";lastSyncTime=Date.now();
      renderMain();
      setTimeout(function(){if(syncStatus==="success"){syncStatus="idle";renderSyncUI()}},3000);
    } else {throw new Error("Format invalide")}
  }).catch(function(e){
    syncStatus="error";syncMsg=e.message||"Erreur";renderSyncUI();
    console.error("Cloud pull error:",e);
  });
}

function cloudCreateBin(){
  if(!syncCfg.apiKey){syncMsg="Clé API requise";renderSyncUI();return}
  syncStatus="syncing";syncMsg="Création du bin...";renderSyncUI();
  var payload=spools.map(function(s){var c=Object.assign({},s);delete c.img;return c});

    method:"POST",

function hexToHSL(hex){try{var r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;var mx=Math.max(r,g,b),mn=Math.min(r,g,b),l=(mx+mn)/2,h=0,s=0;if(mx!==mn){var d=mx-mn;s=l>0.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h=((g-b)/d+(g<b?6:0))*60;break;case g:h=((b-r)/d+2)*60;break;case b:h=((r-g)/d+4)*60;break}}return{h:Math.round(h),s:Math.round(s*100),l:Math.round(l*100)}}catch(e){return{h:0,s:0,l:50}}}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

// ── Import ──
function openImportModal(){importModal=true;importData=[];importSelected=new Set();importError="";renderModals()}
function closeImportModal(){importModal=false;importData=[];importSelected=new Set();importError="";renderModals()}
function handleImportFile(e){
  var f;if(e.target&&e.target.files)f=e.target.files[0];else if(e.dataTransfer)f=e.dataTransfer.files[0];if(!f)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var text=ev.target.result,data;
      if(f.name.endsWith('.json')){data=JSON.parse(text);if(!Array.isArray(data))throw new Error("Le JSON doit contenir un tableau");data=data.map(sanitize)}
      else if(f.name.endsWith('.csv')){data=parseCSV(text)}
      else throw new Error("Format non supporté (.json ou .csv)");
      importData=data;importSelected=new Set(data.map(function(_,i){return i}));importError="";
    }catch(err){importError="❌ "+err.message;importData=[]}
    renderModals();
  };reader.readAsText(f);
}
function parseCSV(text){
  var lines=text.split('\n').map(function(l){return l.trim()}).filter(Boolean);if(lines.length<2)throw new Error("CSV vide");
  var headers=lines[0].split(',').map(function(h){return h.replace(/"/g,'').trim().toLowerCase()});
  var results=[];
  for(var i=1;i<lines.length;i++){
    var vals=[],cur="",inQ=false;
    for(var ci=0;ci<lines[i].length;ci++){var ch=lines[i][ci];if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){vals.push(cur.trim());cur=""}else cur+=ch}
    vals.push(cur.trim());
    var row={};headers.forEach(function(h,j){row[h]=vals[j]?vals[j].replace(/^"|"$/g,''):""});
    var sm={"neuf":"new","en cours":"inuse","terminé":"empty","new":"new","inuse":"inuse","empty":"empty"};
    results.push(sanitize({brand:row.marque||row.brand||"",type:row.type||"PLA Basic",color:row.couleur||row.color||"Sans nom",code:row.code||"",hex:row.hex||"#888888",tempPrint:row["temp buse"]||row.tempprint||"",bedTemp:row["temp lit"]||row.bedtemp||"",drying:row["séchage"]||row.sechage||row.drying||"",speed:row.vitesse||row.speed||"",qty:parseInt(row.rouleaux||row.qty||"1")||1,status:sm[(row.statut||row.status||"new").toLowerCase()]||"new",pct:parseInt(row["% restant"]||row.pct||"100")||100,img:null,notes:row.notes||"",rating:row.avis||row.rating||"none"}));
  }return results;
}
function toggleImportItem(idx){if(importSelected.has(idx))importSelected.delete(idx);else importSelected.add(idx);renderModals()}
function toggleImportAll(){if(importSelected.size===importData.length)importSelected.clear();else importSelected=new Set(importData.map(function(_,i){return i}));renderModals()}
function confirmImport(){
  var toAdd=importData.filter(function(_,i){return importSelected.has(i)});if(!toAdd.length)return;
  var maxId=Math.max.apply(null,[0].concat(spools.map(function(s){return s.id})));
  var added=0,merged=0;
  toAdd.forEach(function(s){
    var dup=checkDuplicate(s);
    if(dup){spools=spools.map(function(x){return x.id===dup.id?Object.assign({},x,{qty:(x.qty||0)+(s.qty||1)}):x});merged++}
    else{maxId++;ensureBrand(s.brand);spools.push(sanitize(Object.assign({},s,{id:maxId})));added++}
  });
  importModal=false;importData=[];importSelected=new Set();importError="";
  saveData();renderMain();renderModals();
  var msg=[];if(added)msg.push(added+" ajouté"+(added>1?"s":""));if(merged)msg.push(merged+" fusionné"+(merged>1?"s":""));
  toast("✅ Import: "+msg.join(", "),3000);
}

    summary='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:12px;padding-top:10px;border-top:1px solid #2A2A3E">';
    fB.forEach(function(b){summary+='<span style="background:#7C4DFF33;color:#B39DDB;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px">'+esc(b)+' <span onclick="toggleFilterB(\''+esc(b)+'\')" style="cursor:pointer;opacity:0.7">✕</span></span>'});
    fT.forEach(function(t){summary+='<span style="background:#00BCD433;color:#80DEEA;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px">'+esc(t)+' <span onclick="toggleFilterT(\''+esc(t)+'\')" style="cursor:pointer;opacity:0.7">✕</span></span>'});
    fS.forEach(function(k){var sv=STATUS_CFG[k];summary+='<span style="background:'+sv.border+'33;color:'+sv.border+';padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px">'+sv.label+' <span onclick="toggleFilterS(\''+k+'\')" style="cursor:pointer;opacity:0.7">✕</span></span>'});
    summary+='</div>';
  }

  return'<div class="filter-panel" id="filter-panel-inner"><div class="filter-header"><span style="font-weight:700">⚙️ Filtres & Tri</span><div><button data-filter="reset" style="background:none;border:none;color:#7C4DFF;cursor:pointer;font-size:12px;margin-right:12px">Réinitialiser</button><button data-filter="close" style="background:none;border:none;color:#888;cursor:pointer;font-size:18px">✕</button></div></div>'+
    '<div class="sec-title">🔀 Trier par</div><select data-filter="sort" style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid #3A3A50;background:#2A2A3E;color:#F0F0F0;font-size:14px"><option value="">Par défaut</option>'+sOpts+'</select>'+
    '<div class="sec-title">🏷️ Marque'+(fB.length?' <span style="color:#7C4DFF;font-size:11px">('+fB.length+')</span>':'')+'</div><div class="chip-wrap">'+brandChips+'</div>'+
    '<div class="sec-title">📦 Type'+(fT.length?' <span style="color:#7C4DFF;font-size:11px">('+fT.length+')</span>':'')+'</div><div class="chip-wrap">'+typeChips+'</div>'+
    '<div class="sec-title">📊 Statut'+(fS.length?' <span style="color:#7C4DFF;font-size:11px">('+fS.length+')</span>':'')+'</div><div class="chip-wrap">'+statChips+'</div>'+
    '<div class="sec-title">⚖️ % Restant: '+pMin+'% – '+pMax+'%</div><div class="range-labels"><span>0%</span><span>100%</span></div>'+
    '<div style="position:relative;height:30px;margin-top:4px"><input type="range" min="0" max="100" value="'+pMin+'" data-filter="range-min" class="hidden-range" style="z-index:2"/><input type="range" min="0" max="100" value="'+pMax+'" data-filter="range-max" class="hidden-range" style="z-index:3"/><div class="range-track"><div class="range-fill" style="left:'+pMin+'%;width:'+(pMax-pMin)+'%"></div></div></div>'+
    summary+'</div>';
}

function handleFilterClick(e){
  var btn=e.target.closest('[data-filter]');
  if(!btn)return;
  var f=btn.getAttribute('data-filter');
  if(f==='brand-all'){fB=[];refreshFilter();renderList()}
  else if(f==='brand'){var bv=btn.getAttribute('data-val');if(bv!==null){var ix=fB.indexOf(bv);if(ix===-1)fB.push(bv);else fB.splice(ix,1);refreshFilter();renderList()}}
  else if(f==='type-all'){fT=[];refreshFilter();renderList()}
  else if(f==='type'){var tv=btn.getAttribute('data-val');if(tv!==null){var ix2=fT.indexOf(tv);if(ix2===-1)fT.push(tv);else fT.splice(ix2,1);refreshFilter();renderList()}}
  else if(f==='status-all'){fS=[];refreshFilter();renderList()}
  else if(f==='status'){var sk=btn.getAttribute('data-val');if(sk!==null){var ix3=fS.indexOf(sk);if(ix3===-1)fS.push(sk);else fS.splice(ix3,1);refreshFilter();renderList()}}
  else if(f==='reset'){fB=[];fT=[];fS=[];pMin=0;pMax=100;sortVal="";refreshFilter();renderList()}
  else if(f==='close'){showFilter=false;renderMain()}
}
function handleFilterSort(e){sortVal=e.target.value;renderList()}
function handleRangeMin(e){if(+e.target.value<=pMax){pMin=+e.target.value;refreshFilter();renderList()}}
function handleRangeMax(e){if(+e.target.value>=pMin){pMax=+e.target.value;refreshFilter();renderList()}}

function bindFilterEvents(){
  var container=document.getElementById('filter-container');
  if(!container)return;
  // Remove old listeners by replacing node (prevents stacking)
  var clone=container.cloneNode(true);
  container.parentNode.replaceChild(clone,container);
  clone.addEventListener('click',handleFilterClick);
  var sortEl=clone.querySelector('[data-filter="sort"]');
  if(sortEl)sortEl.addEventListener('change',handleFilterSort);
  var rMin=clone.querySelector('[data-filter="range-min"]');
  var rMax=clone.querySelector('[data-filter="range-max"]');
  if(rMin)rMin.addEventListener('input',handleRangeMin);
  if(rMax)rMax.addEventListener('input',handleRangeMax);
}

function refreshFilter(){
  var el=document.getElementById('filter-container');
  if(!el)return;
  el.innerHTML=buildFilterHTML();
  bindFilterEvents();
  var afc=getAFC();
  var bEl=document.getElementById('filter-badge');
  if(bEl)bEl.innerHTML=afc?'<span class="badge">'+afc+'</span>':'';
}
