var search="",fB=[],fT=[],fS=[],pMin=0,pMax=100,sortVal="";
var showFilter=false,viewMode="list",showImages=true;
var editModal=null,addModal=false,importModal=false;
var newSpool=fresh();
var selectMode=false,selected=new Set();
var importData=[],importSelected=new Set(),importError="";
var brandDropdownOpen=null,statusPopupId=null,ratingPopupId=null;
var lastAdded=null,dupWarning="",confirmAction=null;
var currentTab="inventory",palette=[],paletteMode=false;
var _fBrands=[],_fTypes=[];

function fresh(){return{brand:"",type:"PLA Basic",color:"",hex:"#888888",code:"",tempPrint:"190–230°C",bedTemp:"35–45°C",drying:"55°C, 8H",speed:"",qty:1,status:"new",pct:100,img:null,notes:"",rating:"none"};}
function canAdd(){return !!(newSpool.color&&newSpool.brand);}

/* ── Confirm ── */
function showConfirm(t,m,fn){confirmAction={t:t,m:m,fn:fn};rdrConfirm();}
function rdrConfirm(){var el=document.getElementById('confirm-root');if(!confirmAction){el.innerHTML='';return;}el.innerHTML='<div class="confirm-overlay" onclick="confirmAction=null;rdrConfirm()"><div class="confirm-box" onclick="event.stopPropagation()"><div class="confirm-title">'+confirmAction.t+'</div><div class="confirm-msg">'+confirmAction.m+'</div><div class="confirm-actions"><button class="confirm-cancel" onclick="confirmAction=null;rdrConfirm()">Annuler</button><button class="confirm-ok" onclick="var f=confirmAction.fn;confirmAction=null;rdrConfirm();f();">Confirmer</button></div></div></div>';}

/* ── Dup ── */
function findDup(sp,exId){if(!sp.color||!sp.brand)return null;var c=sp.color.trim().toLowerCase(),b=sp.brand.trim().toLowerCase(),t=sp.type.trim().toLowerCase();return spools.find(function(s){return(exId?s.id!==exId:true)&&s.color.trim().toLowerCase()===c&&s.brand.trim().toLowerCase()===b&&s.type.trim().toLowerCase()===t;})||null;}

/* ── Brands ── */
function ensureBrand(b){if(!b)return;b=b.trim();if(!b)return;if(!BRANDS.some(function(x){return x.toLowerCase()===b.toLowerCase();})){BRANDS.push(b);BRANDS.sort(function(a,c){return a.toLowerCase().localeCompare(c.toLowerCase());});try{localStorage.setItem('ft-brands',JSON.stringify(BRANDS));}catch(e){}}}

/* ── Persistence ── */
function load(){try{var b=localStorage.getItem('ft-brands');if(b)BRANDS=JSON.parse(b);}catch(e){}try{var s=localStorage.getItem('ft-data');if(s){var p=JSON.parse(s);if(Array.isArray(p)&&p.length)spools=p.map(san);}}catch(e){}try{var pl=localStorage.getItem('ft-palette');if(pl)palette=JSON.parse(pl);}catch(e){}}
function save(){try{localStorage.setItem('ft-data',JSON.stringify(spools.map(function(s){var c=Object.assign({},s);delete c.img;return c;})));spools.forEach(function(s){if(s.img)try{localStorage.setItem('fi-'+s.id,s.img);}catch(e){}});}catch(e){}toast('✅ Sauvegardé');}
function loadImgs(){spools.forEach(function(s){if(!s.img)try{var i=localStorage.getItem('fi-'+s.id);if(i)s.img=i;}catch(e){}});}
function savePal(){try{localStorage.setItem('ft-palette',JSON.stringify(palette));}catch(e){}}

/* ── Filter ── */
function getFiltered(){var r=spools.filter(function(s){if(fB.length&&fB.indexOf(s.brand)===-1)return false;if(fT.length&&fT.indexOf(s.type)===-1)return false;if(fS.length&&fS.indexOf(s.status)===-1)return false;if(s.pct<pMin||s.pct>pMax)return false;if(search){var q=search.toLowerCase();if((s.color+' '+s.brand+' '+s.type+' '+s.code).toLowerCase().indexOf(q)===-1)return false;}return true;});var fn=sortFn(sortVal);if(fn)r=r.slice().sort(fn);return r;}
function getAFC(){return[fB.length,fT.length,fS.length,pMin>0,pMax<100,sortVal].filter(Boolean).length;}
function getBrands(){return Array.from(new Set(spools.map(function(s){return s.brand;}).filter(Boolean))).sort();}
function getTypes(){return Array.from(new Set(spools.map(function(s){return s.type;}).filter(Boolean))).sort();}
function getStats(){return{t:spools.length,n:spools.filter(function(s){return s.status==='new';}).length,u:spools.filter(function(s){return s.status==='inuse';}).length,e:spools.filter(function(s){return s.status==='empty';}).length};}

/* ── Actions ── */
function resetAll(){showConfirm('🔄 Réinitialiser','Réinitialiser tout ?',function(){spools=DEFAULT_SPOOLS.map(san);save();renderMain();});}
function delSpool(id){var s=spools.find(function(x){return x.id===id;});showConfirm('🗑️ Supprimer','Supprimer <strong>'+E(s?s.color:'')+'</strong> ?',function(){spools=spools.filter(function(x){return x.id!==id;});editModal=null;save();renderMain();renderModals();});}
function addSpool(){if(!canAdd())return;var d=findDup(newSpool);if(d){spools=spools.map(function(s){return s.id===d.id?Object.assign({},s,{qty:(s.qty||0)+(newSpool.qty||1)}):s;});lastAdded=Object.assign({},newSpool);newSpool=fresh();addModal=false;dupWarning='';save();renderMain();renderModals();toast('📦 Rouleaux ajoutés à '+E(d.color),2500);return;}ensureBrand(newSpool.brand);var id=Math.max.apply(null,[0].concat(spools.map(function(s){return s.id;})))+1;spools.push(san(Object.assign({},newSpool,{id:id})));lastAdded=Object.assign({},newSpool);newSpool=fresh();addModal=false;dupWarning='';save();renderMain();renderModals();}
function addDup(){if(!canAdd())return;var d=findDup(newSpool);if(d){spools=spools.map(function(s){return s.id===d.id?Object.assign({},s,{qty:(s.qty||0)+(newSpool.qty||1)}):s;});lastAdded=Object.assign({},newSpool);newSpool=Object.assign({},lastAdded,{color:lastAdded.color+' - copy',img:null});dupWarning='';save();renderMain();renderModals();toast('📦 Rouleaux ajoutés à '+E(d.color),2500);return;}ensureBrand(newSpool.brand);var id=Math.max.apply(null,[0].concat(spools.map(function(s){return s.id;})))+1;spools.push(san(Object.assign({},newSpool,{id:id})));lastAdded=Object.assign({},newSpool);newSpool=Object.assign({},lastAdded,{color:lastAdded.color+' - copy',img:null});dupWarning='';save();renderMain();renderModals();}
function saveEdit(){if(!editModal)return;var d=findDup(editModal,editModal.id);if(d){dupWarning='⚠️ Doublon: '+d.color;renderModals();return;}ensureBrand(editModal.brand);spools=spools.map(function(s){return s.id===editModal.id?san(editModal):s;});editModal=null;dupWarning='';save();renderMain();renderModals();}
function openEdit(id,e){e.stopPropagation();dupWarning='';editModal=Object.assign({},spools.find(function(x){return x.id===id;}));renderModals();}
function dupFromEdit(){if(!editModal)return;newSpool=Object.assign({},editModal,{color:editModal.color+' - copy',img:null});delete newSpool.id;editModal=null;addModal=true;dupWarning='';renderModals();}

/* ── Inline controls ── */
function cycleStatus(id,e){e.stopPropagation();ratingPopupId=null;statusPopupId=statusPopupId===id?null:id;renderMain();}
function setSt(id,st,e){e.stopPropagation();spools=spools.map(function(s){if(s.id===id){var u={status:st};if(st==='empty'){u.qty=0;u.pct=0;}else if(st==='new'&&s.qty===0){u.qty=1;u.pct=100;}return Object.assign({},s,u);}return s;});statusPopupId=null;save();renderMain();}
function toggleRPop(id,e){e.stopPropagation();statusPopupId=null;ratingPopupId=ratingPopupId===id?null:id;renderMain();}
function setRat(id,r,e){e.stopPropagation();spools=spools.map(function(s){return s.id===id?Object.assign({},s,{rating:r}):s;});ratingPopupId=null;save();renderMain();}
function chgQty(id,d,e){e.stopPropagation();spools=spools.map(function(s){return s.id===id?Object.assign({},s,{qty:Math.max(0,(s.qty||0)+d)}):s;});save();renderList();}
document.addEventListener('click',function(){if(statusPopupId!==null||ratingPopupId!==null){statusPopupId=null;ratingPopupId=null;renderMain();}});

/* ── Selection ── */
function toggleSel(){selectMode=!selectMode;selected.clear();renderMain();}
function tglSel(id,e){e.stopPropagation();selected.has(id)?selected.delete(id):selected.add(id);renderMain();}
function selAll(){var f=getFiltered();selected.size===f.length?selected.clear():f.forEach(function(s){selected.add(s.id);});renderMain();}
function delSel(){if(!selected.size)return;showConfirm('🗑️','Supprimer '+selected.size+' filament(s) ?',function(){spools=spools.filter(function(s){return!selected.has(s.id);});selected.clear();selectMode=false;save();renderMain();});}
function expJSON(){var x=spools.filter(function(s){return selected.has(s.id);}).map(function(s){var c=Object.assign({},s);delete c.id;return c;});var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(x,null,2)],{type:'application/json'}));a.download='filaments_'+x.length+'.json';a.click();selectMode=false;selected.clear();renderMain();}
function expCSV(){var src=selectMode&&selected.size?spools.filter(function(s){return selected.has(s.id);}):spools;var h='Marque,Type,Couleur,Code,Hex,Rouleaux,Statut,%,Notes\n';var r=src.map(function(s){return[s.brand,s.type,s.color,s.code,s.hex,s.qty,SC[s.status].l,s.pct,s.notes].map(function(v){return'"'+(v||'')+'"';}).join(',');}).join('\n');var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+h+r],{type:'text/csv;charset=utf-8;'}));a.download='filaments.csv';a.click();if(selectMode){selectMode=false;selected.clear();}renderMain();}

/* ── Import ── */
function openImp(){importModal=true;importData=[];importSelected=new Set();importError='';renderModals();}
function closeImp(){importModal=false;importData=[];importSelected=new Set();importError='';renderModals();}
function handleImpFile(e){var f;if(e.target&&e.target.files)f=e.target.files[0];else if(e.dataTransfer)f=e.dataTransfer.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(ev){try{var t=ev.target.result,d;if(f.name.endsWith('.json')){d=JSON.parse(t);if(!Array.isArray(d))throw new Error('JSON invalide');d=d.map(san);}else throw new Error('.json requis');importData=d;importSelected=new Set(d.map(function(_,i){return i;}));importError='';}catch(er){importError='❌ '+er.message;importData=[];}renderModals();};rd.readAsText(f);}
function tglImpItem(i){importSelected.has(i)?importSelected.delete(i):importSelected.add(i);renderModals();}
function tglImpAll(){importSelected.size===importData.length?importSelected.clear():(importSelected=new Set(importData.map(function(_,i){return i;})));renderModals();}
function doImport(){var add=importData.filter(function(_,i){return importSelected.has(i);});if(!add.length)return;var mx=Math.max.apply(null,[0].concat(spools.map(function(s){return s.id;}))),ad=0,mg=0;add.forEach(function(s){var d=findDup(s);if(d){spools=spools.map(function(x){return x.id===d.id?Object.assign({},x,{qty:(x.qty||0)+(s.qty||1)}):x;});mg++;}else{mx++;ensureBrand(s.brand);spools.push(san(Object.assign({},s,{id:mx})));ad++;}});importModal=false;importData=[];importSelected=new Set();save();renderMain();renderModals();toast('✅ '+ad+' ajouté(s), '+mg+' fusionné(s)',3000);}

/* ── Palette ── */
function tglPal(id,e){if(e)e.stopPropagation();var i=palette.indexOf(id);i===-1?palette.push(id):palette.splice(i,1);savePal();currentTab==='palette'?renderMain():renderList();}
function rmPal(id){palette=palette.filter(function(p){return p!==id;});savePal();renderMain();}
function clearPal(){palette=[];savePal();renderMain();}
function inPal(id){return palette.indexOf(id)!==-1;}
function switchTab(t){currentTab=t;if(t==='palette')paletteMode=false;renderMain();}
function tglPalMode(){paletteMode=!paletteMode;renderMain();}

/* ── Brand dropdown ── */
function showBD(p){brandDropdownOpen=p;rdrBD(p);}
function hideBD(){setTimeout(function(){brandDropdownOpen=null;var d=document.getElementById('brand-dd');if(d)d.innerHTML='';},200);}
function pickB(p,b){if(p==='add')newSpool.brand=b;else if(editModal)editModal.brand=b;brandDropdownOpen=null;var inp=document.getElementById(p+'-bi');if(inp)inp.value=b;var d=document.getElementById('brand-dd');if(d)d.innerHTML='';if(p==='add')rdrAddFoot();chkDupLive(p);}
function rdrBD(p){var v=p==='add'?newSpool.brand:(editModal?editModal.brand:'');var fl=BRANDS.filter(function(b){return b.toLowerCase().indexOf((v||'').toLowerCase())!==-1;});var d=document.getElementById('brand-dd');if(!d||!fl.length){if(d)d.innerHTML='';return;}d.innerHTML='<div class="brand-list">'+fl.map(function(b){return'<div class="brand-item" onmousedown="event.preventDefault();pickB(\''+p+'\',\''+E(b)+'\')">'+E(b)+'</div>';}).join('')+'</div>';}
function chkDupLive(p){var d=p==='add'?newSpool:editModal;if(!d)return;var dup=findDup(d,p==='edit'&&editModal?editModal.id:null);var el=document.getElementById(p+'-dw');if(dup&&el)el.innerHTML='<div class="dup-warning">📦 Existe déjà — rouleaux seront ajoutés.</div>';else if(el)el.innerHTML='';}

/* ── Form ── */
function ufl(p,f,v){if(p==='add')newSpool[f]=v;else if(editModal)editModal[f]=v;if(f==='status'&&v==='empty'){ufl(p,'qty',0);ufl(p,'pct',0);var q=document.getElementById(p+'-qi');if(q)q.value='0';var r=document.getElementById(p+'-pr');if(r)r.value='0';var l=document.getElementById(p+'-pl');if(l)l.textContent='Restant: 0%';}if(f==='status'&&v==='new'){var dd=p==='add'?newSpool:editModal;if(dd&&dd.qty===0){ufl(p,'qty',1);var q2=document.getElementById(p+'-qi');if(q2)q2.value='1';}if(dd&&dd.pct===0){ufl(p,'pct',100);var r2=document.getElementById(p+'-pr');if(r2)r2.value='100';var l2=document.getElementById(p+'-pl');if(l2)l2.textContent='Restant: 100%';}}if(f==='pct'){var lb=document.getElementById(p+'-pl');if(lb)lb.textContent='Restant: '+v+'% (~'+Math.round(v*10)+'g)';}if(f==='brand'&&brandDropdownOpen===p)rdrBD(p);if(p==='add'&&(f==='color'||f==='brand'))rdrAddFoot();if(f==='color'||f==='brand'||f==='type')chkDupLive(p);}
function htcl(p,t){ufl(p,'type',t);var d=TD[t];if(d){ufl(p,'tempPrint',d.tp);ufl(p,'bedTemp',d.tb);ufl(p,'drying',d.dr);var a=document.getElementById(p+'-tp');if(a)a.value=d.tp;var b=document.getElementById(p+'-bt');if(b)b.value=d.tb;var c=document.getElementById(p+'-dr');if(c)c.value=d.dr;}}
function imgUp(e,p){var f=e.target.files?e.target.files[0]:null;if(!f)return;var r=new FileReader();r.onload=function(ev){ufl(p,'img',ev.target.result);renderModals();};r.readAsDataURL(f);}
function rdrAddFoot(){var el=document.getElementById('add-foot');if(!el)return;var ok=canAdd();el.innerHTML='<button class="btn-save" onclick="addSpool()" style="flex:3;opacity:'+(ok?1:.4)+'"'+(ok?'':' disabled')+'>Ajouter</button><button class="'+(ok?'dup-btn-on':'dup-btn-off')+'" onclick="'+(ok?'addDup()':'void(0)')+'"'+(ok?'':' disabled')+'>📋</button>';}

function formHTML(d,p){
  var so=Object.keys(SC).map(function(k){return'<option value="'+k+'"'+(d.status===k?' selected':'')+'>'+SC[k].l+'</option>';}).join('');
  var to=TYPES.map(function(t){return'<option value="'+t+'"'+(d.type===t?' selected':'')+'>'+t+'</option>';}).join('');
  var ro=RO.map(function(k){return'<option value="'+k+'"'+((d.rating||'none')===k?' selected':'')+'>'+RC[k].l+' '+RC[k].n+'</option>';}).join('');
  return'<div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:16px"><div class="img-upload" onclick="document.getElementById(\''+p+'-fi\').click()">'+(d.img?'<img src="'+d.img+'"/>':'<div class="img-placeholder">📷<br>Photo</div>')+'</div><input type="file" id="'+p+'-fi" accept="image/*" style="display:none" onchange="imgUp(event,\''+p+'\')"/><div style="flex:1"><div class="color-row" style="margin-bottom:12px"><div style="flex:1"><label class="lbl">Couleur *</label><input value="'+E(d.color)+'" oninput="ufl(\''+p+'\',\'color\',this.value)"/></div><div><label class="lbl">Hex</label><input type="color" value="'+d.hex+'" class="hex-picker" oninput="ufl(\''+p+'\',\'hex\',this.value)"/></div></div></div></div>'+
  '<div class="form-row"><div class="form-group"><label class="lbl">Marque *</label><div class="brand-dropdown"><input id="'+p+'-bi" value="'+E(d.brand)+'" onfocus="showBD(\''+p+'\')" oninput="ufl(\''+p+'\',\'brand\',this.value)" onblur="hideBD()" placeholder="Marque..."/><div id="brand-dd"></div></div></div><div class="form-group"><label class="lbl">Type</label><select onchange="htcl(\''+p+'\',this.value)">'+to+'</select></div></div>'+
  '<div id="'+p+'-dw"></div>'+
  '<div class="form-row"><div class="form-group"><label class="lbl">Statut</label><select onchange="ufl(\''+p+'\',\'status\',this.value)">'+so+'</select></div><div class="form-group"><label class="lbl">Avis</label><select onchange="ufl(\''+p+'\',\'rating\',this.value)">'+ro+'</select></div></div>'+
  '<div class="form-row"><div class="form-group"><label class="lbl">Temp. buse</label><input id="'+p+'-tp" value="'+E(d.tempPrint)+'" oninput="ufl(\''+p+'\',\'tempPrint\',this.value)"/></div><div class="form-group"><label class="lbl">Temp. lit</label><input id="'+p+'-bt" value="'+E(d.bedTemp)+'" oninput="ufl(\''+p+'\',\'bedTemp\',this.value)"/></div></div>'+
  '<div class="form-row"><div class="form-group"><label class="lbl">Séchage</label><input id="'+p+'-dr" value="'+E(d.drying)+'" oninput="ufl(\''+p+'\',\'drying\',this.value)"/></div><div class="form-group"><label class="lbl">Vitesse</label><input value="'+E(d.speed||'')+'" oninput="ufl(\''+p+'\',\'speed\',this.value)" placeholder="mm/s"/></div></div>'+
  '<div class="form-row"><div class="form-group"><label class="lbl">Code</label><input value="'+E(d.code)+'" oninput="ufl(\''+p+'\',\'code\',this.value)"/></div><div class="form-group"><label class="lbl">Rouleaux</label><input type="number" min="0" id="'+p+'-qi" value="'+(d.qty!=null?d.qty:1)+'" oninput="ufl(\''+p+'\',\'qty\',Math.max(0,+this.value||0))" style="text-align:center"/></div></div>'+
  '<div class="form-group"><label class="lbl" id="'+p+'-pl">Restant: '+d.pct+'% (~'+Math.round(d.pct*10)+'g)</label><input type="range" min="0" max="100" id="'+p+'-pr" value="'+d.pct+'" oninput="ufl(\''+p+'\',\'pct\',+this.value)" style="width:100%;accent-color:#7C4DFF"/></div>'+
  '<div class="form-group"><label class="lbl">Notes</label><textarea oninput="ufl(\''+p+'\',\'notes\',this.value)">'+E(d.notes||'')+'</textarea></div>';
}

/* ── Render helpers ── */
function rChk(id,c){return selectMode?'<div class="select-checkbox'+(c?' checked':'')+'" onclick="tglSel('+id+',event)">'+(c?'✓':'')+'</div>':'';}
function rIcon(s,cls){if(showImages&&s.img)return'<div style="position:relative;flex-shrink:0"><img src="'+s.img+'" style="width:72px;height:72px;border-radius:12px;object-fit:cover;cursor:pointer" onclick="openEdit('+s.id+',event)"/><div class="pastille" style="background:'+s.hex+'"></div></div>';return'<div class="'+cls+'" style="background:'+s.hex+';cursor:pointer" onclick="openEdit('+s.id+',event)"></div>';}
function rQty(s){var z=s.qty===0;return'<div class="qty-ctrl"><button class="qty-btn" onclick="chgQty('+s.id+',-1,event)">−</button><div class="qty-val'+(z?' qty-zero':'')+'">'+(s.qty||0)+'</div><button class="qty-btn" onclick="chgQty('+s.id+',1,event)">+</button></div>';}
function rStBadge(s,pos){var st=SC[s.status];var pop='';if(statusPopupId===s.id){pop='<div class="popup-menu" style="'+(pos||'top:100%;right:0;margin-top:4px')+'" onclick="event.stopPropagation()">';SO.forEach(function(k){var c=SC[k];pop+='<div class="popup-item" style="background:'+(s.status===k?c.bg+'66':'transparent')+'" onclick="setSt('+s.id+',\''+k+'\',event)"><div class="dot" style="background:'+c.bd+'"></div><span style="color:'+c.tx+'">'+c.l+'</span></div>';});pop+='</div>';}return'<div style="position:relative;display:inline-block"><span class="status-badge" style="background:'+st.bg+';color:'+st.tx+';border:1px solid '+st.bd+'" onclick="cycleStatus('+s.id+',event)">'+st.l+' ▾</span>'+pop+'</div>';}
function rRtBadge(s,pos){var rt=RC[s.rating||'none'];var pop='';if(ratingPopupId===s.id){pop='<div class="popup-menu" style="'+(pos||'top:100%;right:0;margin-top:4px')+'" onclick="event.stopPropagation()">';RO.forEach(function(k){var c=RC[k];pop+='<div class="popup-item" style="background:'+((s.rating||'none')===k?c.bg:'transparent')+'" onclick="setRat('+s.id+',\''+k+'\',event)"><span>'+c.l+'</span><span style="color:'+c.c+';font-size:11px">'+c.n+'</span></div>';});pop+='</div>';}return'<div style="position:relative;display:inline-block"><span class="status-badge" style="background:'+rt.bg+';color:'+rt.c+';border:1px solid '+rt.c+'44;font-size:12px" onclick="toggleRPop('+s.id+',event)">'+rt.l+' ▾</span>'+pop+'</div>';}

function rCardList(s){
  var sel=selected.has(s.id),oos=s.qty===0,st=SC[s.status];
  var cls='card-list'+(sel?' selected':'')+(oos?' out-of-stock':'');
  var clk=selectMode?'onclick="tglSel('+s.id+',event)"':paletteMode?'onclick="tglPal('+s.id+',event)"':'';
  var tt=s.notes?' title="📝 '+E(s.notes)+'"':'';
  var pc=paletteMode?'<div class="pal-check'+(inPal(s.id)?' on':'')+'" onclick="tglPal('+s.id+',event)">'+(inPal(s.id)?'✓':'')+'</div>':'';
  return'<div class="'+cls+'" '+clk+tt+'>'+rChk(s.id,sel)+pc+
    '<div style="display:flex;flex-direction:column;align-items:center;gap:6px;'+(selectMode?'margin-left:20px':'')+'">'+rIcon(s,'spool-icon')+rQty(s)+'</div>'+
    '<div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="color-name">'+E(s.color)+(oos?' <span style="font-size:11px;color:#F44336">· Épuisé</span>':'')+'</div><div class="brand-type">'+E(s.brand)+' · '+E(s.type)+'</div></div>'+
    '<div style="display:flex;align-items:center;gap:6px"><span class="status-col">'+rRtBadge(s)+'</span><span class="status-col">'+rStBadge(s)+'</span><button class="edit-btn" onclick="openEdit('+s.id+',event)">✏️</button></div></div>'+
    '<div class="specs"><span title="Température de buse">🌡️ '+E(s.tempPrint)+'</span><span title="Température du lit">🛏️ '+E(s.bedTemp||'N/A')+'</span><span title="Séchage">💨 '+E(s.drying)+'</span>'+(s.speed?'<span title="Vitesse">🚀 '+E(s.speed)+'</span>':'')+(s.code?'<span title="Code">#'+E(s.code)+'</span>':'')+'</div>'+
    (s.notes?'<div class="notes-line">📝 '+E(s.notes)+'</div>':'')+
    '<div style="display:flex;align-items:center;gap:8px"><div style="flex:1"><div class="progress-bar"><div class="progress-fill" style="width:'+spct(s)+'%;background:'+st.bd+'"></div></div><div class="progress-text">'+s.pct+'% · ~'+Math.round(s.pct*10)+'g</div></div><span class="rating-inline" style="display:none">'+rRtBadge(s,'bottom:100%;right:0;margin-bottom:4px')+'</span></div></div></div>';}

function rCardGrid(s){
  var sel=selected.has(s.id),oos=s.qty===0,st=SC[s.status];
  var cls='card-grid'+(sel?' selected':'')+(oos?' out-of-stock':'');
  var clk=selectMode?'onclick="tglSel('+s.id+',event)"':paletteMode?'onclick="tglPal('+s.id+',event)"':'';
  var tt=s.notes?' title="📝 '+E(s.notes)+'"':'';
  var pc=paletteMode?'<div class="pal-check'+(inPal(s.id)?' on':'')+'" onclick="tglPal('+s.id+',event)">'+(inPal(s.id)?'✓':'')+'</div>':'';
  return'<div class="'+cls+'" '+clk+tt+'>'+rChk(s.id,sel)+pc+
    '<button class="edit-btn" style="position:absolute;top:8px;right:'+(paletteMode?'40px':'8px')+'" onclick="openEdit('+s.id+',event)">✏️</button>'+
    '<div style="position:relative;display:inline-block">'+rIcon(s,'spool-icon-grid')+'<div style="position:absolute;top:4px;left:4px">'+rStBadge(s,'top:100%;left:0;margin-top:4px')+'</div></div>'+
    '<div class="color-name" style="font-size:13px;margin-top:4px">'+E(s.color)+'</div><div class="brand-type">'+E(s.brand)+' · '+E(s.type)+'</div>'+
    '<div style="display:flex;justify-content:center;margin-top:6px">'+rQty(s)+'</div>'+
    '<div class="specs-grid">🌡️'+E(s.tempPrint)+'</div><div class="specs-grid">🛏️'+E(s.bedTemp||'N/A')+' 💨'+E(s.drying)+(s.speed?' 🚀'+E(s.speed):'')+'</div>'+
    '<div class="progress-bar" style="height:4px;margin-top:8px"><div class="progress-fill" style="width:'+spct(s)+'%;background:'+st.bd+';height:100%"></div></div>'+
    '<div class="progress-text">'+s.pct+'%</div></div>';}

function rSelBar(){if(!selectMode)return'';var f=getFiltered(),a=selected.size===f.length&&f.length>0;return'<div class="select-bar"><button class="select-bar-btn" style="background:#2A2A3E;color:#DDD" onclick="selAll()">'+(a?'☐':'☑')+' Tout</button><span style="font-size:13px;color:#B39DDB;font-weight:600">'+selected.size+' sél.</span><div style="flex:1"></div>'+(selected.size?'<button class="select-bar-btn" style="background:#7C4DFF;color:#fff" onclick="expJSON()">JSON</button><button class="select-bar-btn" style="background:#00897B;color:#fff" onclick="expCSV()">CSV</button><button class="select-bar-btn" style="background:#F4433644;color:#F44336" onclick="delSel()">🗑️</button>':'')+'<button class="select-bar-btn" style="background:#333;color:#AAA" onclick="toggleSel()">✕</button></div>';}

function rPalView(){
  var ps=palette.map(function(id){return spools.find(function(s){return s.id===id;});}).filter(Boolean);
  if(!ps.length)return'<div class="palette-view"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-size:16px;font-weight:700;color:#00BCD4">🎨 Mon Projet</span></div><div style="text-align:center;padding:30px;color:#555;font-size:13px">Aucun filament.<br><br>Va dans <strong>Inventaire</strong>, clique 📌 puis sélectionne.</div></div>';
  var sw='<div class="pal-swatch-row">'+ps.map(function(s){return'<div class="pal-swatch" style="background:'+s.hex+'" title="'+E(s.color)+'" onclick="rmPal('+s.id+')"></div>';}).join('')+'</div>';
  var items=ps.map(function(s){var st=SC[s.status],rt=RC[s.rating||'none'];var ic=showImages&&s.img?'<div style="position:relative"><img src="'+s.img+'" style="width:48px;height:48px;border-radius:10px;object-fit:cover"/><div class="pastille" style="background:'+s.hex+'"></div></div>':'<div class="pal-color" style="background:'+s.hex+'"></div>';return'<div class="pal-item"><button class="pal-remove" onclick="rmPal('+s.id+')">✕</button>'+ic+'<div style="flex:1;min-width:0"><div class="color-name" style="font-size:14px">'+E(s.color)+'</div><div class="brand-type">'+E(s.brand)+' · '+E(s.type)+(s.code?' · #'+E(s.code):'')+'</div><div class="specs" style="margin-top:4px"><span>🌡️ '+E(s.tempPrint)+'</span><span>🛏️ '+E(s.bedTemp||'N/A')+'</span><span>💨 '+E(s.drying)+'</span>'+(s.speed?'<span>🚀 '+E(s.speed)+'</span>':'')+'</div><div style="display:flex;gap:8px;margin-top:6px;align-items:center"><span style="font-size:11px;color:#888">📦 '+(s.qty||0)+'</span><span class="status-badge" style="background:'+st.bg+';color:'+st.tx+';border:1px solid '+st.bd+';font-size:9px">'+st.l+'</span>'+(s.rating&&s.rating!=='none'?'<span style="font-size:12px">'+rt.l+'</span>':'')+'</div>'+(s.notes?'<div class="notes-line" style="margin-top:4px;font-size:10px">📝 '+E(s.notes)+'</div>':'')+'</div></div>';}).join('');
  return'<div class="palette-view"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-size:16px;font-weight:700;color:#00BCD4">🎨 Mon Projet <span style="font-size:12px;color:#888;font-weight:400">'+ps.length+' filament'+(ps.length>1?'s':'')+'</span></span><button onclick="clearPal()" style="background:none;border:none;color:#F44336;cursor:pointer;font-size:12px;font-weight:600">Vider</button></div>'+sw+items+'</div>';
}

/* ── Filter panel (event delegation) ── */
function buildFilter(){
  if(!showFilter)return'';
  _fBrands=getBrands();_fTypes=getTypes();
  var sOpts=SORTS.map(function(o){return'<option value="'+o.v+'"'+(sortVal===o.v?' selected':'')+'>'+o.l+'</option>';}).join('');
  function ch(on,l,ac){ac=ac||'#7C4DFF';return'<button class="chip" style="background:'+(on?ac+'22':'#2A2A3E')+';color:'+(on?ac:'#888')+';border:'+(on?'1px solid '+ac:'1px solid #333')+'">'+l+'</button>';}
  var bc='<button class="chip" data-f="ba">'+ch(!fB.length,'Toutes').replace(/<\/?button[^>]*>/g,'')+'</button>';
  _fBrands.forEach(function(b,i){bc+='<button class="chip" data-f="b" data-i="'+i+'">'+ch(fB.indexOf(b)!==-1,E(b)).replace(/<\/?button[^>]*>/g,'')+'</button>';});
  var tc='<button class="chip" data-f="ta">'+ch(!fT.length,'Tous').replace(/<\/?button[^>]*>/g,'')+'</button>';
  _fTypes.forEach(function(t,i){tc+='<button class="chip" data-f="t" data-i="'+i+'">'+ch(fT.indexOf(t)!==-1,E(t)).replace(/<\/?button[^>]*>/g,'')+'</button>';});
  var sc='<button class="chip" data-f="sa">'+ch(!fS.length,'Tous').replace(/<\/?button[^>]*>/g,'')+'</button>';
  SO.forEach(function(k){sc+='<button class="chip" data-f="s" data-k="'+k+'">'+ch(fS.indexOf(k)!==-1,SC[k].l,SC[k].bd).replace(/<\/?button[^>]*>/g,'')+'</button>';});
  return'<div class="filter-panel" id="fp"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-weight:700">⚙️ Filtres</span><div><button data-f="reset" style="background:none;border:none;color:#7C4DFF;cursor:pointer;font-size:12px;margin-right:12px">Reset</button><button data-f="close" style="background:none;border:none;color:#888;cursor:pointer;font-size:18px">✕</button></div></div>'+
  '<div class="sec-title">Trier</div><select data-f="sort" style="width:100%;padding:10px;border-radius:10px;border:1px solid #3A3A50;background:#2A2A3E;color:#F0F0F0;font-size:14px"><option value="">Défaut</option>'+sOpts+'</select>'+
  '<div class="sec-title">Marque</div><div class="chip-wrap">'+bc+'</div>'+
  '<div class="sec-title">Type</div><div class="chip-wrap">'+tc+'</div>'+
  '<div class="sec-title">Statut</div><div class="chip-wrap">'+sc+'</div>'+
  '<div class="sec-title">% Restant: '+pMin+'–'+pMax+'%</div><div class="range-labels"><span>0%</span><span>100%</span></div>'+
  '<div style="position:relative;height:30px;margin-top:4px"><input type="range" min="0" max="100" value="'+pMin+'" data-f="rmin" class="hidden-range" style="z-index:2"/><input type="range" min="0" max="100" value="'+pMax+'" data-f="rmax" class="hidden-range" style="z-index:3"/><div class="range-track"><div class="range-fill" style="left:'+pMin+'%;width:'+(pMax-pMin)+'%"></div></div></div></div>';
}
function bindFilter(){
  var fp=document.getElementById('fp');if(!fp)return;
  fp.addEventListener('click',function(ev){
    var b=ev.target.closest('[data-f]');if(!b)return;var f=b.getAttribute('data-f');
    if(f==='ba'){fB.length=0;}
    else if(f==='b'){var v=_fBrands[+b.getAttribute('data-i')];if(v){var i=fB.indexOf(v);i===-1?fB.push(v):fB.splice(i,1);}}
    else if(f==='ta'){fT.length=0;}
    else if(f==='t'){var v2=_fTypes[+b.getAttribute('data-i')];if(v2){var i2=fT.indexOf(v2);i2===-1?fT.push(v2):fT.splice(i2,1);}}
    else if(f==='sa'){fS.length=0;}
    else if(f==='s'){var k=b.getAttribute('data-k');var i3=fS.indexOf(k);i3===-1?fS.push(k):fS.splice(i3,1);}
    else if(f==='reset'){fB.length=0;fT.length=0;fS.length=0;pMin=0;pMax=100;sortVal='';}
    else if(f==='close'){showFilter=false;renderMain();return;}
    else return;
    reFilter();
  });
  var sort=fp.querySelector('[data-f="sort"]');if(sort)sort.addEventListener('change',function(){sortVal=this.value;reFilter();});
  var rmn=fp.querySelector('[data-f="rmin"]');if(rmn)rmn.addEventListener('input',function(){if(+this.value<=pMax){pMin=+this.value;reFilter();}});
  var rmx=fp.querySelector('[data-f="rmax"]');if(rmx)rmx.addEventListener('input',function(){if(+this.value>=pMin){pMax=+this.value;reFilter();}});
}
function reFilter(){var fc=document.getElementById('fc');if(fc){fc.innerHTML=buildFilter();bindFilter();}renderList();}

/* ── renderList ── */
function renderList(){
  if(currentTab==='palette'){renderMain();return;}
  var el=document.getElementById('sc');if(!el){renderMain();return;}
  var fl=getFiltered(),afc=getAFC(),tq=spools.reduce(function(a,s){return a+(s.qty||0);},0);
  el.innerHTML=(afc||search?'<div style="font-size:12px;color:#888;margin-bottom:10px">'+fl.length+' / '+spools.length+(afc?' · <button onclick="fB.length=0;fT.length=0;fS.length=0;pMin=0;pMax=100;sortVal=\'\';reFilter()" style="background:none;border:none;color:#7C4DFF;cursor:pointer;font-size:12px">Effacer</button>':'')+'</div>':'')+
  (fl.length?viewMode==='list'?'<div class="spool-list">'+fl.map(rCardList).join('')+'</div>':'<div class="spool-grid">'+fl.map(rCardGrid).join('')+'</div>':'<div style="text-align:center;color:#666;padding:40px">Aucun filament</div>')+
  '<div style="text-align:center;margin-top:24px;font-size:12px;color:#555">'+spools.length+' réf · '+tq+' roul. · ~'+Math.round(spools.reduce(function(a,s){return a+s.pct*10*(s.qty||0);},0))+'g</div><div style="text-align:center;margin-top:12px"><button onclick="resetAll()" style="background:none;border:none;color:#555;font-size:11px;cursor:pointer;text-decoration:underline">🔄 Réinitialiser</button></div>';
}

/* ── renderMain ── */
function renderMain(){
  var st=getStats(),afc=getAFC();
  var tab='<div class="tab-bar"><button class="tab-btn" style="background:'+(currentTab==='inventory'?'#7C4DFF':'transparent')+';color:'+(currentTab==='inventory'?'#fff':'#777')+'" onclick="switchTab(\'inventory\')">📦 Inventaire</button><button class="tab-btn" style="background:'+(currentTab==='palette'?'#00BCD4':'transparent')+';color:'+(currentTab==='palette'?'#fff':'#777')+'" onclick="switchTab(\'palette\')">🎨 Projet'+(palette.length?' ('+palette.length+')':'')+'</button></div>';
  var hdr='<div class="mobile-top"><div style="text-align:center;margin-bottom:12px;padding-top:20px"><h1>🧵 Filament Tracker</h1><p style="color:#555;font-size:11px;margin-top:4px">💾 Auto-save</p></div><div class="stats-grid">'+[{l:'Total',v:st.t,bg:'#7C4DFF22',c:'#B39DDB'},{l:'Neufs',v:st.n,bg:'#4CAF5022',c:'#81C784'},{l:'En cours',v:st.u,bg:'#FF980022',c:'#FFB74D'},{l:'Terminés',v:st.e,bg:'#F4433622',c:'#E57373'}].map(function(x){return'<div class="stat-card" style="background:'+x.bg+'"><div class="stat-val" style="color:'+x.c+'">'+x.v+'</div><div class="stat-lbl">'+x.l+'</div></div>';}).join('')+'</div></div>';
  var body='';
  if(currentTab==='palette'){body=rPalView();}
  else{
    body='<div class="sticky-header"><div class="toolbar"><input class="search-input" id="si" placeholder="🔍 Rechercher..." value="'+E(search)+'" oninput="search=this.value;renderList()"/><div class="view-toggle"><button class="view-btn" style="background:'+(viewMode==='list'?'#7C4DFF':'#2A2A3E')+';color:'+(viewMode==='list'?'#fff':'#777')+'" onclick="viewMode=\'list\';renderMain()">☰</button><button class="view-btn" style="background:'+(viewMode==='grid'?'#7C4DFF':'#2A2A3E')+';color:'+(viewMode==='grid'?'#fff':'#777')+'" onclick="viewMode=\'grid\';renderMain()">⊞</button></div><button class="btn" onclick="tglPalMode()" style="'+(paletteMode?'border-color:#00BCD4;background:#00BCD422;color:#00BCD4':'')+'">📌</button><button class="btn" onclick="showImages=!showImages;renderMain()">'+(showImages?'🎨':'🖼️')+'</button><button class="btn" style="'+(afc?'border-color:#7C4DFF;background:#7C4DFF22;color:#B39DDB':'')+'" onclick="showFilter=!showFilter;renderMain()">⚙️'+(afc?'<span class="badge">'+afc+'</span>':'')+'</button><button class="btn" style="'+(selectMode?'border-color:#7C4DFF;background:#7C4DFF22;color:#B39DDB':'')+'" onclick="toggleSel()">☑️</button><button class="btn" onclick="openImp()">📥</button><button class="btn-primary" onclick="addModal=true;dupWarning=\'\';renderModals()">+</button></div>'+rSelBar()+'<div id="fc"></div></div><div id="sc"></div>';
  }
  document.getElementById('app').innerHTML='<div class="container'+(paletteMode?' palette-mode':'')+'">'+hdr+tab+body+'</div>';
  if(currentTab==='inventory'){
    if(showFilter){var fc=document.getElementById('fc');if(fc){fc.innerHTML=buildFilter();bindFilter();}}
    renderList();
  }
}

/* ── Modals ── */
function renderModals(){
  var root=document.getElementById('modal-root'),html='';
  if(addModal){var ok=canAdd();html+='<div class="modal-overlay" onclick="addModal=false;renderModals()"><div class="modal-content" onclick="event.stopPropagation()"><button class="modal-close" onclick="addModal=false;renderModals()">✕</button><h2 style="margin:0 0 18px;font-size:20px;font-weight:700">➕ Nouveau</h2>'+formHTML(newSpool,'add')+'<div id="add-foot" style="display:flex;gap:10px;margin-top:20px"><button class="btn-save" onclick="addSpool()" style="flex:3;opacity:'+(ok?1:.4)+'"'+(ok?'':' disabled')+'>Ajouter</button><button class="'+(ok?'dup-btn-on':'dup-btn-off')+'" onclick="'+(ok?'addDup()':'void(0)')+'"'+(ok?'':' disabled')+'>📋</button></div></div></div>';}
  if(editModal){html+='<div class="modal-overlay" onclick="editModal=null;renderModals()"><div class="modal-content" onclick="event.stopPropagation()"><button class="modal-close" onclick="editModal=null;renderModals()">✕</button><h2 style="margin:0 0 18px;font-size:20px;font-weight:700">✏️ Modifier <button onclick="dupFromEdit()" style="font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid #7C4DFF44;background:#7C4DFF15;color:#B39DDB;cursor:pointer;font-weight:600">📋</button></h2>'+formHTML(editModal,'edit')+'<div style="display:flex;gap:10px;margin-top:20px"><button class="btn-save" style="flex:1" onclick="saveEdit()">Sauvegarder</button><button class="btn-delete" onclick="delSpool('+editModal.id+')">🗑️</button></div></div></div>';}
  if(importModal){var as=importSelected.size===importData.length&&importData.length>0;html+='<div class="modal-overlay" onclick="closeImp()"><div class="modal-content" onclick="event.stopPropagation()" style="max-width:520px"><button class="modal-close" onclick="closeImp()">✕</button><h2 style="margin:0 0 6px;font-size:20px;font-weight:700">📥 Importer</h2><div class="import-zone" onclick="document.getElementById(\'iif\').click()" style="margin-top:12px"><div style="font-size:36px">📁</div><div style="font-size:14px;font-weight:600;color:#B39DDB;margin-top:8px">Glisser ou cliquer</div></div><input type="file" id="iif" accept=".json" style="display:none" onchange="handleImpFile(event)"/>'+(importError?'<div style="margin-top:12px;padding:10px;background:#F4433622;border-radius:10px;color:#EF5350;font-size:13px">'+importError+'</div>':'')+(importData.length?'<div style="display:flex;justify-content:space-between;margin-top:16px;margin-bottom:8px"><span style="font-size:13px;font-weight:700;color:#CCC">'+importData.length+' trouvé(s)</span><button onclick="tglImpAll()" style="background:none;border:none;color:#7C4DFF;cursor:pointer;font-size:12px;font-weight:600">'+(as?'Désél.':'Tout')+'</button></div><div class="import-preview">'+importData.map(function(s,i){var sel=importSelected.has(i);return'<div class="import-item" onclick="tglImpItem('+i+')" style="border:1px solid '+(sel?'#7C4DFF44':'transparent')+'"><div class="select-checkbox'+(sel?' checked':'')+'" style="position:static;width:20px;height:20px;font-size:11px">'+(sel?'✓':'')+'</div><div class="color-dot" style="background:'+s.hex+'"></div><div style="flex:1"><div style="font-weight:600;font-size:13px">'+E(s.color)+'</div><div style="font-size:11px;color:#888">'+E(s.brand)+' · '+E(s.type)+'</div></div><div style="font-size:11px;color:#777">x'+(s.qty||1)+'</div></div>';}).join('')+'</div><button class="btn-save" style="margin-top:16px;opacity:'+(importSelected.size?1:.4)+'" onclick="doImport()"'+(importSelected.size?'':' disabled')+'>Importer '+importSelected.size+'</button>':'')+'</div></div>';}
  root.innerHTML=html;
}

/* ── Init ── */
load();loadImgs();renderMain();
</script>
</body>
</html>
