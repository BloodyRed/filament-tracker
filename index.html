function hexToHSL(hex){
  var r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  var max=Math.max(r,g,b),min=Math.min(r,g,b),l=(max+min)/2;
  var h=0,s=0;
  if(max!==min){var d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))*60;break;case g:h=((b-r)/d+2)*60;break;case b:h=((r-g)/d+4)*60;break}}
  return{h:Math.round(h),s:Math.round(s*100),l:Math.round(l*100)};
}

// тФАтФА Duplicate check тФАтФА
function checkDuplicate(spool,excludeId){
  if(!spool.color||!spool.brand||!spool.type)return null;
  var c=spool.color.trim().toLowerCase(),b=spool.brand.trim().toLowerCase(),t=spool.type.trim().toLowerCase();
  return spools.find(function(s){
    if(excludeId&&s.id===excludeId)return false;
    return s.color.trim().toLowerCase()===c&&s.brand.trim().toLowerCase()===b&&s.type.trim().toLowerCase()===t;
  })||null;
}

function ensureBrandExists(brand){
  if(!brand)return;var b=brand.trim();if(!b)return;
  var exists=BRANDS.some(function(x){return x.toLowerCase()===b.toLowerCase()});
  if(!exists){BRANDS.push(b);BRANDS.sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase())});saveCustomBrands()}
}

function handleImportFile(e){
  var f;if(e.target&&e.target.files)f=e.target.files[0];else if(e.dataTransfer)f=e.dataTransfer.files[0];if(!f)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var text=ev.target.result;var data;
      if(f.name.endsWith('.json')){
        data=JSON.parse(text);if(!Array.isArray(data))throw new Error("Le JSON doit contenir un tableau");
        data=data.map(function(s){return{brand:s.brand||"",type:s.type||"PLA Basic",color:s.color||"Sans nom",code:s.code||"",hex:s.hex||"#888888",tempPrint:s.tempPrint||"",bedTemp:s.bedTemp||"",drying:s.drying||"",status:s.status||"new",pct:s.pct!=null?s.pct:100,img:s.img||null,notes:s.notes||"",rating:s.rating||"none"}});
      }else if(f.name.endsWith('.csv')){data=parseCSVImport(text)}
      else throw new Error("Format non support├й (.json ou .csv)");
      importData=data;importSelected=new Set(data.map(function(_,i){return i}));importError="";
    }catch(err){importError="тЭМ "+err.message;importData=[]}
    renderModals();
  };reader.readAsText(f);
}
function parseCSVImport(text){
  var lines=text.split('\n').map(function(l){return l.trim()}).filter(function(l){return l});if(lines.length<2)throw new Error("CSV vide");
  var headers=lines[0].split(',').map(function(h){return h.replace(/"/g,'').trim().toLowerCase()});
  var results=[];
  for(var i=1;i<lines.length;i++){
    var vals=[],cur="",inQ=false;
    for(var ci=0;ci<lines[i].length;ci++){var ch=lines[i][ci];if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){vals.push(cur.trim());cur=""}else cur+=ch}
    vals.push(cur.trim());
    var row={};headers.forEach(function(h,j){row[h]=vals[j]?vals[j].replace(/^"|"$/g,''):""});
    var sm={"neuf":"new","en cours":"inuse","termin├й":"empty","new":"new","inuse":"inuse","empty":"empty"};
    results.push({brand:row.marque||row.brand||"",type:row.type||"PLA Basic",color:row.couleur||row.color||"Sans nom",code:row.code||"",hex:row.hex||"#888888",tempPrint:row["temp buse"]||row.tempprint||"",bedTemp:row["temp lit"]||row.bedtemp||"",drying:row["s├йchage"]||row.sechage||row.drying||"",status:sm[(row.statut||row.status||"new").toLowerCase()]||"new",pct:parseInt(row["% restant"]||row.pct||"100")||100,img:null,notes:row.notes||"",rating:row.avis||row.rating||"none"});
  }return results;
}

function updateFieldLive(prefix,field,value){
  if(prefix==='add')newSpool[field]=value;

  if(field==='pct'){var lbl=document.getElementById(prefix+'-pct-label');if(lbl)lbl.textContent="Restant: "+value+"% (~"+Math.round(value*10)+"g)"}

      '<h2 style="margin:0 0 18px;font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px">тЬПя╕П Modifier<button onclick="duplicateFromEdit()" style="font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid #7C4DFF44;background:#7C4DFF15;color:#B39DDB;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:4px" title="Dupliquer ce filament">ЁЯУЛ Dupliquer</button></h2>'+
      renderFormFields(editModal,'edit')+
      '<div style="display:flex;gap:10px;margin-top:20px"><button class="btn-save" style="flex:1" onclick="saveEditAction()">Sauvegarder</button><button class="btn-delete" onclick="deleteSpool('+editModal.id+')">ЁЯЧСя╕П</button></div></div></div>';
  }
  if(importModal){
    var allSel=importSelected.size===importData.length&&importData.length>0;
    html+='<div class="modal-overlay" onclick="closeImportModal()"><div class="modal-content" onclick="event.stopPropagation()" style="max-width:520px"><button class="modal-close" onclick="closeImportModal()">тЬХ</button><h2 style="margin:0 0 6px;font-size:20px;font-weight:700">ЁЯУе Importer des filaments</h2><p style="font-size:12px;color:#888;margin-bottom:16px">Supporte <strong>.json</strong> et <strong>.csv</strong></p>'+
    '<div class="import-zone" onclick="document.getElementById(\'import-file-input\').click()" ondragover="event.preventDefault();this.classList.add(\'dragover\')" ondragleave="this.classList.remove(\'dragover\')" ondrop="event.preventDefault();this.classList.remove(\'dragover\');handleImportFile(event)"><div style="font-size:36px;margin-bottom:8px">ЁЯУБ</div><div style="font-size:14px;font-weight:600;color:#B39DDB">Glisser un fichier ici</div><div style="font-size:12px;color:#777;margin-top:4px">ou cliquer pour parcourir</div></div>'+
    '<input type="file" id="import-file-input" accept=".json,.csv" style="display:none" onchange="handleImportFile(event)"/>'+
    (importError?'<div style="margin-top:12px;padding:10px;background:#F4433622;border-radius:10px;color:#EF5350;font-size:13px">'+importError+'</div>':'')+
    (importData.length?
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;margin-bottom:8px"><span style="font-size:13px;font-weight:700;color:#CCC">'+importData.length+' filament'+(importData.length>1?'s':'')+' trouv├й'+(importData.length>1?'s':'')+'</span><button onclick="toggleImportAll()" style="background:none;border:none;color:#7C4DFF;cursor:pointer;font-size:12px;font-weight:600">'+(allSel?'D├йs├йlectionner':'Tout s├йlectionner')+'</button></div>'+
      '<div class="import-preview">'+importData.map(function(s,i){var sel=importSelected.has(i);return'<div class="import-item" onclick="toggleImportItem('+i+')" style="'+(sel?'border:1px solid #7C4DFF44':'border:1px solid transparent')+'"><div class="select-checkbox '+(sel?'checked':'')+'" style="position:static;width:20px;height:20px;font-size:11px">'+(sel?'тЬУ':'')+'</div><div class="color-dot" style="background:'+s.hex+'"></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">'+esc(s.color)+'</div><div style="font-size:11px;color:#888">'+esc(s.brand)+' ┬╖ '+esc(s.type)+(s.code?' #'+esc(s.code):'')+'</div></div><div style="font-size:11px;color:#777">'+s.pct+'%</div></div>'}).join("")+'</div>'+
      '<button class="btn-save" style="margin-top:16px;opacity:'+(importSelected.size?'1':'0.4')+'" onclick="confirmImport()"'+(importSelected.size?'':' disabled')+'>Importer '+importSelected.size+' filament'+(importSelected.size>1?'s':'')+'</button>'
    :'')+
    '</div></div>';
  }
  root.innerHTML=html;
}

loadData();
</script>
